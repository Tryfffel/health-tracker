name: Oura sync

# Hämtar Oura-data och sparar den som oura-data.json i repot.
# Körs automatiskt flera gånger varje morgon + kan köras manuellt.
# Flera körtider eftersom GitHubs gratis-schemaläggare ofta är sen eller
# hoppar över körningar — jobbet committar bara om datan faktiskt ändrats,
# så extra körningar är gratis och ofarliga.
on:
  schedule:
    - cron: "45 3 * * *"   # 05:45 svensk sommartid
    - cron: "30 4 * * *"   # 06:30
    - cron: "15 5 * * *"   # 07:15
    - cron: "0 6 * * *"    # 08:00
    - cron: "0 8 * * *"    # 10:00 (sista uppsamlingen)
  workflow_dispatch:        # låter dig trycka "Run workflow" manuellt

permissions:
  contents: write           # behövs för att committa oura-data.json

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - name: Checka ut repot
        uses: actions/checkout@v4

      - name: Hämta Oura-data
        env:
          OURA_TOKEN: ${{ secrets.OURA_TOKEN || secrets.DASHBOARD }}
        run: |
          cat > fetch-oura.mjs <<'EOF'
          const TOKEN = process.env.OURA_TOKEN;
          if (!TOKEN) { console.error("OURA_TOKEN saknas"); process.exit(1); }
          const BASE = "https://api.ouraring.com/v2/usercollection";
          const DAYS = 200;

          const ymd = (d) => d.getFullYear() + "-" +
            String(d.getMonth() + 1).padStart(2, "0") + "-" +
            String(d.getDate()).padStart(2, "0");

          async function ouraGet(path, params) {
            const u = new URL(BASE + path);
            Object.entries(params).forEach(([k, v]) => u.searchParams.set(k, v));
            const r = await fetch(u, { headers: { Authorization: "Bearer " + TOKEN } });
            if (!r.ok) { console.warn("Oura " + path + " -> " + r.status); return []; }
            const b = await r.json();
            return Array.isArray(b.data) ? b.data : [];
          }

          const end = new Date();
          const start = new Date(); start.setDate(start.getDate() - DAYS);
          const endPlus = new Date(end); endPlus.setDate(endPlus.getDate() + 1);
          const range = { start_date: ymd(start), end_date: ymd(endPlus) };

          const [dailySleep, dailyReadiness, sleepSessions, dailyActivity, dailyStress, dailySpo2, dailyResilience, vo2Max, cardioAge] =
            await Promise.all([
              ouraGet("/daily_sleep", range),
              ouraGet("/daily_readiness", range),
              ouraGet("/sleep", range),
              ouraGet("/daily_activity", range),
              ouraGet("/daily_stress", range),
              ouraGet("/daily_spo2", range),
              ouraGet("/daily_resilience", range),
              ouraGet("/vO2_max", range),
              ouraGet("/daily_cardiovascular_age", range),
            ]);

          const byDay = {};
          const ensure = (day) => (byDay[day] = byDay[day] || {
            date: day,
            // Sömn
            sleep_score: null, total_sleep_min: null, deep_sleep_min: null, rem_sleep_min: null,
            sleep_efficiency: null, sleep_latency_min: null, avg_hr_sleep: null, breath_avg: null,
            // Återhämtning
            dagsform_score: null, hrv_avg: null, resting_hr: null, temp_dev: null,
            // Aktivitet
            steps: null, active_cal: null, total_cal: null,
            // Stress / andning
            stress_high_min: null, recovery_high_min: null, stress_summary: null,
            spo2_avg: null, breathing_disturbance: null,
            // Läggtider & sömndetaljer
            bedtime_start: null, bedtime_end: null, awake_min: null, time_in_bed_min: null, restless: null,
            // Aktivitetsdetaljer
            high_act_min: null, med_act_min: null, low_act_min: null, sedentary_min: null,
            inactivity_alerts: null, met_min: null,
            // Långsiktiga mått
            resilience: null, vo2max: null, cardio_age: null,
          });

          const r1 = (v) => (v != null ? Math.round(v) : null);
          const min = (sec) => (sec != null ? Math.round(sec / 60) : null);

          dailySleep.forEach((d) => { if (d.day) ensure(d.day).sleep_score = d.score ?? null; });
          dailyReadiness.forEach((d) => {
            if (!d.day) return;
            const o = ensure(d.day);
            o.dagsform_score = d.score ?? null;
            o.temp_dev = d.temperature_deviation != null ? Math.round(d.temperature_deviation * 100) / 100 : null;
          });

          // Huvudsömnen per dag (long_sleep, annars längsta)
          const mainByDay = {};
          sleepSessions.forEach((s) => {
            if (!s.day) return;
            const cur = mainByDay[s.day];
            const isLong = s.type === "long_sleep";
            if (!cur) { mainByDay[s.day] = s; return; }
            const curIsLong = cur.type === "long_sleep";
            if (isLong && !curIsLong) { mainByDay[s.day] = s; return; }
            if (isLong === curIsLong && (s.total_sleep_duration || 0) > (cur.total_sleep_duration || 0))
              mainByDay[s.day] = s;
          });
          Object.entries(mainByDay).forEach(([day, s]) => {
            const o = ensure(day);
            o.total_sleep_min = min(s.total_sleep_duration);
            o.deep_sleep_min = min(s.deep_sleep_duration);
            o.rem_sleep_min = min(s.rem_sleep_duration);
            o.hrv_avg = r1(s.average_hrv);
            o.resting_hr = r1(s.lowest_heart_rate);
            o.avg_hr_sleep = r1(s.average_heart_rate);
            o.breath_avg = s.average_breath != null ? Math.round(s.average_breath * 10) / 10 : null;
            o.sleep_efficiency = r1(s.efficiency);
            o.sleep_latency_min = min(s.latency);
            o.bedtime_start = s.bedtime_start || null;
            o.bedtime_end = s.bedtime_end || null;
            o.awake_min = min(s.awake_time);
            o.time_in_bed_min = min(s.time_in_bed);
            o.restless = s.restless_periods ?? null;
          });

          dailyActivity.forEach((d) => {
            if (!d.day) return;
            const o = ensure(d.day);
            o.steps = d.steps ?? null;
            o.active_cal = r1(d.active_calories);
            o.total_cal = r1(d.total_calories);
            o.high_act_min = min(d.high_activity_time);
            o.med_act_min = min(d.medium_activity_time);
            o.low_act_min = min(d.low_activity_time);
            o.sedentary_min = min(d.sedentary_time);
            o.inactivity_alerts = d.inactivity_alerts ?? null;
            o.met_min = d.average_met_minutes != null ? r1(d.average_met_minutes) : null;
          });

          dailyStress.forEach((d) => {
            if (!d.day) return;
            const o = ensure(d.day);
            o.stress_high_min = min(d.stress_high);
            o.recovery_high_min = min(d.recovery_high);
            o.stress_summary = d.day_summary ?? null;
          });

          dailySpo2.forEach((d) => {
            if (!d.day) return;
            const o = ensure(d.day);
            o.spo2_avg = (d.spo2_percentage && d.spo2_percentage.average != null)
              ? Math.round(d.spo2_percentage.average * 10) / 10 : null;
            o.breathing_disturbance = d.breathing_disturbance_index ?? null;
          });

          dailyResilience.forEach((d) => {
            if (d.day) ensure(d.day).resilience = d.level ?? null;
          });

          vo2Max.forEach((d) => {
            const day = d.day || (d.timestamp || "").slice(0, 10);
            if (day && d.vo2_max != null) ensure(day).vo2max = Math.round(d.vo2_max * 10) / 10;
          });

          cardioAge.forEach((d) => {
            if (d.day && d.vascular_age != null) ensure(d.day).cardio_age = d.vascular_age;
          });

          const out = Object.values(byDay).sort((a, b) => (a.date < b.date ? 1 : -1));
          const fs = await import("node:fs");
          fs.writeFileSync("oura-data.json", JSON.stringify(out));
          console.log("Skrev oura-data.json med " + out.length + " dagar");
          EOF
          node fetch-oura.mjs

      - name: Committa om datan ändrats
        run: |
          rm -f fetch-oura.mjs
          if [ -n "$(git status --porcelain oura-data.json)" ]; then
            git config user.name  "oura-bot"
            git config user.email "oura-bot@users.noreply.github.com"
            git add oura-data.json
            git commit -m "Uppdatera Oura-data $(date -u +%Y-%m-%d)"
            git push
          else
            echo "Ingen förändring i Oura-datan."
          fi
