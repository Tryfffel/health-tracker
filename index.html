<!DOCTYPE html>
<html lang="sv">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Hälsodagbok</title>
  <meta name="theme-color" content="#4f46e5">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="default">
  <meta name="apple-mobile-web-app-title" content="Hälsodagbok">
  <link rel="manifest" href="manifest.json">
  <link rel="apple-touch-icon" href="icon-192.png">
  <script src="https://unpkg.com/react@18/umd/react.production.min.js" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js" crossorigin="anonymous"></script>
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="charts.js"></script>
  <script src="analytics.js"></script>
</head>
<body class="bg-gray-100">
<div id="root"></div>


<script>
// localStorage polyfill matching the window.storage API
window.storage = {
  get: async (key) => ({ value: localStorage.getItem(key) }),
  set: async (key, value) => { localStorage.setItem(key, value); }
};
const h = React.createElement;
const { useState, useEffect } = React;
// ─── Sub-components ──────────────────────────────────────────────────────────
const Toast = ({ toast, onClose }) => {
  if (!toast) return null;
  return h('div', {
    className: 'fixed top-4 right-4 z-50 px-5 py-3 rounded-xl shadow-lg text-white flex items-center gap-3 ' + (toast.type === 'error' ? 'bg-red-500' : 'bg-green-500')
  },
    h('span', { className: 'text-sm font-medium' }, toast.msg),
    h('button', { onClick: onClose, className: 'hover:opacity-70 text-lg leading-none ml-2' }, '×')
  );
};
const StatCard = ({ emoji, label, value, sub, subColor, accent, bg }) =>
  h('div', { className: 'bg-white rounded-xl p-4 shadow-md border-l-4 overflow-hidden relative ' + (accent || 'border-indigo-400') },
    h('div', { className: 'absolute -top-4 -right-4 w-20 h-20 rounded-full opacity-[0.08] ' + (bg || 'bg-indigo-500') }),
    h('div', { className: 'relative text-2xl mb-1' }, emoji),
    h('p', { className: 'relative text-xs text-gray-500 uppercase tracking-wide font-medium' }, label),
    h('p', { className: 'relative text-2xl font-bold text-gray-800 mt-1' }, value),
    sub ? h('p', { className: 'relative text-xs mt-1 ' + (subColor || 'text-gray-500') }, sub) : null
  );
const IntensityDots = ({ level }) =>
  h('span', { className: 'inline-flex gap-0.5 items-center' },
    ...[1,2,3,4,5].map(i =>
      h('span', { key: i, className: 'w-2 h-2 rounded-full ' + (i <= level ? 'bg-orange-400' : 'bg-gray-200') })
    )
  );
// ─── Main Component ───────────────────────────────────────────────────────────
function WeightStepTracker() {
  const todayStr = () => { var d = new Date(); return d.getFullYear()+'-'+String(d.getMonth()+1).padStart(2,'0')+'-'+String(d.getDate()).padStart(2,'0'); };
  const [entries, setEntries]       = useState([]);
  const [workouts, setWorkouts]     = useState([]);
  const [goalWeight, setGoalWeight]       = useState(85);
  const [targetRate, setTargetRate]       = useState(0.5);
  const [height, setHeight]               = useState(180);
  const [yearlyGoal, setYearlyGoal]       = useState({ sessions: 100, minutes: 5000 });
  const [newEntry, setNewEntry]     = useState({ date: todayStr(), weight: '', steps: '', mood: '', comment: '' });
  const [newWorkout, setNewWorkout] = useState({ date: todayStr(), type: '', duration: '', intensity: '3', comment: '' });
  const [view, setView]             = useState('overview');
  const [importText, setImportText] = useState('');
  const [showImport, setShowImport] = useState(false);
  const [toast, setToast]           = useState(null);
  const [loading, setLoading]       = useState(true);
  const [lastBackup, setLastBackup] = useState(null);
  const [appSettings, setAppSettings] = useState({ injectionDay: 2, stepGoal: 8000, stepTarget: 12000, sleepNeed: 450, latitude: 59.3, ghToken: '', backupPassword: '' });
  const [lastCloudBackup, setLastCloudBackup] = useState(null);
  const [experiments, setExperiments] = useState([]);
  const [expForm, setExpForm] = useState({ date: '', label: '' });
  const [dayLogs, setDayLogs] = useState({});
  const saveDayLogs = function(obj) {
    setDayLogs(obj);
    window.storage.set('day-logs', JSON.stringify(obj));
  };
  const setDayTag = function(date, key, val) {
    var next = Object.assign({}, dayLogs);
    next[date] = Object.assign({}, next[date] || {});
    if (val == null) delete next[date][key]; else next[date][key] = val;
    saveDayLogs(next);
  };
  const bodyFatPct = Analytics.bodyFatPct;
  const [checkups, setCheckups] = useState([]);
  const [checkupForm, setCheckupForm] = useState({});
  const [showCheckupForm, setShowCheckupForm] = useState(false);
  const CHECKUP_FIELDS = [
    { key: 'heartage', label: 'Hjärtålder', unit: 'år', dec: 0, better: 'down', ref: null },
    { key: 'sys', label: 'Blodtryck systoliskt', unit: 'mmHg', dec: 0, better: 'down', ref: function(v){ return v < 120 ? 'good' : v < 140 ? 'warn' : 'bad'; } },
    { key: 'dia', label: 'Blodtryck diastoliskt', unit: 'mmHg', dec: 0, better: 'down', ref: function(v){ return v < 80 ? 'good' : v < 90 ? 'warn' : 'bad'; } },
    { key: 'ankle', label: 'Ankeltryck', unit: 'mmHg', dec: 0, better: 'down', ref: null },
    { key: 'abi', label: 'ABI', unit: 'ratio', dec: 2, better: 'up', ref: function(v){ return (v >= 0.9 && v <= 1.4) ? 'good' : 'warn'; } },
    { key: 'spo2', label: 'Syremättnad', unit: '%', dec: 0, better: 'up', ref: function(v){ return v >= 95 ? 'good' : v >= 92 ? 'warn' : 'bad'; } },
    { key: 'pulse', label: 'Puls (vila, mätt)', unit: 'slag/min', dec: 0, better: 'down', ref: function(v){ return v < 70 ? 'good' : v < 80 ? 'warn' : 'bad'; } },
    { key: 'ekg_pr', label: 'EKG överledningstid (PR)', unit: 'ms', dec: 0, better: 'down', ref: function(v){ return (v >= 120 && v <= 200) ? 'good' : v <= 220 ? 'warn' : 'bad'; } },
    { key: 'ekg_qrs', label: 'EKG kammaraktivering (QRS)', unit: 'ms', dec: 0, better: 'down', ref: function(v){ return v < 110 ? 'good' : v <= 120 ? 'warn' : 'bad'; } },
    { key: 'ekg_qtc', label: 'EKG återhämtning (QTc)', unit: 'ms', dec: 0, better: 'down', ref: function(v){ return v < 450 ? 'good' : v < 470 ? 'warn' : 'bad'; } },
    { key: 'totchol', label: 'Totalkolesterol', unit: 'mmol/L', dec: 2, better: 'down', ref: function(v){ return v < 5.0 ? 'good' : v < 6.2 ? 'warn' : 'bad'; } },
    { key: 'ldl', label: 'LDL', unit: 'mmol/L', dec: 2, better: 'down', ref: function(v){ return v < 3.0 ? 'good' : v < 4.1 ? 'warn' : 'bad'; } },
    { key: 'hdl', label: 'HDL', unit: 'mmol/L', dec: 2, better: 'up', ref: function(v){ return v >= 1.2 ? 'good' : v >= 1.0 ? 'warn' : 'bad'; } },
    { key: 'nonhdl', label: 'Non-HDL', unit: 'mmol/L', dec: 2, better: 'down', ref: function(v){ return v < 3.4 ? 'good' : v < 4.1 ? 'warn' : 'bad'; } },
    { key: 'tg', label: 'Triglycerider', unit: 'mmol/L', dec: 2, better: 'down', ref: function(v){ return v < 1.7 ? 'good' : v < 2.3 ? 'warn' : 'bad'; } },
    { key: 'hba1c', label: 'HbA1c', unit: 'mmol/mol', dec: 0, better: 'down', ref: function(v){ return v < 42 ? 'good' : v < 48 ? 'warn' : 'bad'; } },
    { key: 'glucose', label: 'Glukos', unit: 'mmol/L', dec: 1, better: 'down', ref: function(v){ return v < 6.1 ? 'good' : v < 7.0 ? 'warn' : 'bad'; } },
    { key: 'crp', label: 'hsCRP', unit: 'mg/L', dec: 1, better: 'down', ref: function(v){ return v < 1 ? 'good' : v < 3 ? 'warn' : 'bad'; } },
    { key: 'lpk', label: 'Vita blodkroppar', unit: 'x10⁹/L', dec: 1, better: 'down', ref: function(v){ return (v >= 3.5 && v <= 8.8) ? 'good' : 'warn'; } },
    { key: 'neutro', label: 'Neutrofiler', unit: 'x10⁹/L', dec: 1, better: 'down', ref: function(v){ return (v >= 1.6 && v <= 5.9) ? 'good' : 'warn'; } },
    { key: 'lymf', label: 'Lymfocyter', unit: 'x10⁹/L', dec: 1, better: 'down', ref: function(v){ return (v >= 1.1 && v <= 3.5) ? 'good' : 'warn'; } },
    { key: 'hb', label: 'Hemoglobin', unit: 'g/L', dec: 0, better: 'up', ref: function(v){ return (v >= 130 && v <= 170) ? 'good' : 'warn'; } },
    { key: 'eye', label: 'Ögontryck', unit: 'mmHg', dec: 1, better: 'down', ref: function(v){ return (v >= 8 && v <= 21) ? 'good' : 'warn'; } },
    { key: 'weight', label: 'Vikt (vid mätning)', unit: 'kg', dec: 1, better: 'down', ref: null },
    { key: 'waist', label: 'Midjemått', unit: 'cm', dec: 0, better: 'down', ref: function(v){ return v < 94 ? 'good' : v < 102 ? 'warn' : 'bad'; } },
    { key: 'grip', label: 'Greppstyrka', unit: 'kg', dec: 0, better: 'up', ref: function(v){ return v >= 40 ? 'good' : v >= 30 ? 'warn' : 'bad'; } }
  ];
  const parseNekoText = Analytics.parseNekoText;
  const saveCheckups = function(list) {
    setCheckups(list);
    window.storage.set('checkups', JSON.stringify(list));
  };
  const CryptoBox = {
    b64: function(buf){ var b=''; new Uint8Array(buf).forEach(function(x){ b += String.fromCharCode(x); }); return btoa(b); },
    ub64: function(s){ var bin = atob(s); var a = new Uint8Array(bin.length); for (var i = 0; i < bin.length; i++) a[i] = bin.charCodeAt(i); return a; },
    key: async function(password, salt, usage) {
      var km = await crypto.subtle.importKey('raw', new TextEncoder().encode(password), 'PBKDF2', false, ['deriveKey']);
      return crypto.subtle.deriveKey({ name:'PBKDF2', salt: salt, iterations: 150000, hash: 'SHA-256' }, km, { name:'AES-GCM', length: 256 }, false, [usage]);
    },
    enc: async function(obj, password) {
      var salt = crypto.getRandomValues(new Uint8Array(16)), iv = crypto.getRandomValues(new Uint8Array(12));
      var key = await CryptoBox.key(password, salt, 'encrypt');
      var ct = await crypto.subtle.encrypt({ name:'AES-GCM', iv: iv }, key, new TextEncoder().encode(JSON.stringify(obj)));
      return JSON.stringify({ v: 1, salt: CryptoBox.b64(salt), iv: CryptoBox.b64(iv), data: CryptoBox.b64(ct) });
    },
    dec: async function(txt, password) {
      var o = JSON.parse(txt);
      var key = await CryptoBox.key(password, CryptoBox.ub64(o.salt), 'decrypt');
      var pt = await crypto.subtle.decrypt({ name:'AES-GCM', iv: CryptoBox.ub64(o.iv) }, key, CryptoBox.ub64(o.data));
      return JSON.parse(new TextDecoder().decode(pt));
    }
  };
  const [pixelMetric, setPixelMetric] = useState('mood');
  const mulberry32 = Analytics.mulberry32;
  const [selectedDay, setSelectedDay] = useState(null);
  const [compareWeeks, setCompareWeeks] = useState(4);
  const [bbDay, setBbDay] = useState(null);
  const WEEKDAY_NAMES = ['söndag','måndag','tisdag','onsdag','torsdag','fredag','lördag'];
  const MOOD_EMOJIS = ['😞','😕','😐','🙂','😄'];
  const MOOD_LABELS = ['Tungt','Sådär','Ok','Bra','Toppen'];
  const calcPearson = Analytics.calcPearson;
  const showToast = (msg, type) => {
    setToast({ msg, type: type || 'success' });
    setTimeout(() => setToast(null), 3000);
  };


// ─── OURA INTEGRATION ──────────────────────────────────────────────────────
  const OURA_API = 'https://tryf-api.duckdns.org';
  const [ouraData, setOuraData] = useState([]);
  const [ouraLastSync, setOuraLastSync] = useState(null);
  const [ouraConnected, setOuraConnected] = useState(false);
  const [ouraSyncing, setOuraSyncing] = useState(false);
  const [ouraRange, setOuraRange] = useState(90);
  const [showAllInsights, setShowAllInsights] = useState(false);

  useEffect(function() {
    // Load cached Oura data
    Promise.all([
      window.storage.get('oura-data'),
      window.storage.get('oura-last-sync'),
      window.storage.get('oura-connected')
    ]).then(function(r) {
      if (r[0] && r[0].value) setOuraData(JSON.parse(r[0].value));
      if (r[1] && r[1].value) setOuraLastSync(r[1].value);
      if (r[2] && r[2].value === 'true') setOuraConnected(true);
    });
  }, []);

  const fetchOuraData = function(silent) {
    return fetch('oura-data.json?t=' + Date.now())
      .then(function(r) { return r.json(); })
      .then(function(data) {
        if (!Array.isArray(data)) throw new Error('Bad response');
        setOuraData(data);
        var now = new Date().toISOString();
        setOuraLastSync(now);
        setOuraConnected(true);
        window.storage.set('oura-data', JSON.stringify(data));
        window.storage.set('oura-last-sync', now);
        window.storage.set('oura-connected', 'true');
        if (!silent) showToast('💍 Oura synkad — ' + data.length + ' dagar');
        return data;
      })
      .catch(function(err) {
        console.error('Oura fetch failed', err);
        if (!silent) showToast('Kunde inte synka Oura', 'error');
      });
  };

  const triggerOuraSync = function() {
    setOuraSyncing(true);
    fetchOuraData(false)
      .catch(function() { showToast('Sync misslyckades', 'error'); })
      .finally(function() { setOuraSyncing(false); });
  };

  // ── Apple Health-bron: auto-importera Watch-pass från apple-workouts.json ──
  useEffect(function() {
    if (loading) return;
    fetch('apple-workouts.json?t=' + Date.now())
      .then(function(r){ if (!r.ok) throw new Error('saknas'); return r.json(); })
      .then(function(list) {
        if (!Array.isArray(list) || !list.length) return;
        setWorkouts(function(prev) {
          var nya = list.filter(function(it){
            return it && it.date && it.duration && !prev.some(function(w){ return w.id === it.id; });
          }).map(function(it) {
            return { id: it.id || ('ah-' + it.date + '-' + it.duration), date: it.date, type: it.type || 'Annat',
              duration: Math.round(it.duration), intensity: it.intensity || 3, comment: (it.comment || '⌚ Apple Watch') };
          });
          if (!nya.length) return prev;
          showToast('⌚ ' + nya.length + ' pass importerade från Apple Watch');
          return prev.concat(nya).sort(function(a,b){ return new Date(a.date) - new Date(b.date); });
        });
      })
      .catch(function(){});
  }, [loading]);
  // Auto-fetch on load if data is stale (>2h)
  useEffect(function() {
    if (loading) return;
    var lastSync = ouraLastSync ? new Date(ouraLastSync).getTime() : 0;
    var twoHoursAgo = Date.now() - 2 * 60 * 60 * 1000;
    if (lastSync < twoHoursAgo) {
      fetchOuraData(true);
    }
  }, [loading, ouraConnected]);

  // Helpers
  const ouraLatest = ouraData.length > 0 ? ouraData[0] : null;
  const ouraStats = Analytics.computeOuraStats(ouraData);

  useEffect(() => { loadData(); }, []);
  useEffect(() => { if (!loading) saveData(); }, [entries, workouts, goalWeight, targetRate, yearlyGoal, height, appSettings, loading]);

  // ─── WEGOVY STATE ────────────────────────────────────────────────────────
  const WEGOVY_DEFAULT_PROTOCOL = {
    start_date: null, current_dose: 0.25, first_step_weeks: 6, weeks_per_step: 4,
    titration_plan: [
      { weeks: '1-6',  dose: 0.25 }, { weeks: '7-10', dose: 0.5  },
      { weeks: '11-14',dose: 1.0  }, { weeks: '15-18',dose: 1.7  },
      { weeks: '19+',  dose: 2.4  }
    ]
  };
  const buildTitrationPlan = Analytics.buildTitrationPlan;
  const WEGOVY_DEFAULT_DOSES = [];
  const [wegovyDoses, setWegovyDoses] = useState(null);
  const [wegovyProtocol, setWegovyProtocol] = useState(null);
  const [wgovLoading, setWgovLoading] = useState(true);
  const [showDoseForm, setShowDoseForm] = useState(false);
  const [editProtocol, setEditProtocol] = useState(false);
  const [doseForm, setDoseForm] = useState({});

  useEffect(function() {
    Promise.all([
      window.storage.get('wegovy-doses'),
      window.storage.get('wegovy-protocol')
    ]).then(function(r) {
      setWegovyDoses((r[0] && r[0].value) ? JSON.parse(r[0].value) : WEGOVY_DEFAULT_DOSES);
      setWegovyProtocol((r[1] && r[1].value) ? JSON.parse(r[1].value) : WEGOVY_DEFAULT_PROTOCOL);
      setWgovLoading(false);
    });
  }, []);


  // Read URL params injected by iOS Shortcut: ?steps=8500&date=2026-02-25
  const loadData = async () => {
    try {
      const results = await Promise.all([
        window.storage.get('weight-entries'),
        window.storage.get('workouts'),
        window.storage.get('goal-weight'),
        window.storage.get('yearly-goal'),
        window.storage.get('user-height'),
        window.storage.get('target-rate'),
        window.storage.get('last-backup'),
        window.storage.get('app-settings'),
        window.storage.get('last-cloud-backup'),
        window.storage.get('experiments'),
        window.storage.get('checkups'),
        window.storage.get('day-logs'),
      ]);
      if (results[0] && results[0].value) setEntries(JSON.parse(results[0].value));
      if (results[1] && results[1].value) setWorkouts(JSON.parse(results[1].value));
      if (results[2] && results[2].value) setGoalWeight(parseFloat(results[2].value));
      if (results[3] && results[3].value) setYearlyGoal(JSON.parse(results[3].value));
      if (results[4] && results[4].value) setHeight(parseFloat(results[4].value));
      if (results[5] && results[5].value) setTargetRate(parseFloat(results[5].value));
      if (results[6] && results[6].value) setLastBackup(results[6].value);
      if (results[7] && results[7].value) setAppSettings(Object.assign({ injectionDay: 2, stepGoal: 8000, stepTarget: 12000, sleepNeed: 450, latitude: 59.3, ghToken: '', backupPassword: '' }, JSON.parse(results[7].value)));
      if (results[8] && results[8].value) setLastCloudBackup(results[8].value);
      if (results[9] && results[9].value) setExperiments(JSON.parse(results[9].value));
      if (results[10] && results[10].value) setCheckups(JSON.parse(results[10].value));
      if (results[11] && results[11].value) setDayLogs(JSON.parse(results[11].value));
    } catch (err) {
      console.log('Ingen sparad data', err);
    } finally {
      setLoading(false);
    }
  };
  const saveData = async () => {
    try {
      await Promise.all([
        window.storage.set('weight-entries', JSON.stringify(entries)),
        window.storage.set('workouts',       JSON.stringify(workouts)),
        window.storage.set('goal-weight',    goalWeight.toString()),
        window.storage.set('yearly-goal',    JSON.stringify(yearlyGoal)),
        window.storage.set('user-height',    height.toString()),
        window.storage.set('target-rate',    targetRate.toString()),
        window.storage.set('app-settings',   JSON.stringify(appSettings)),
      ]);
    } catch (err) { console.error(err); }
  };

  const addEntry = () => {
    if (!newEntry.weight) return;
    var wVal = parseFloat(String(newEntry.weight).replace(',', '.'));
    if (isNaN(wVal) || wVal < 30 || wVal > 300) { showToast('Vikten verkar orimlig — ange 30–300 kg', 'error'); return; }
    const entry = {
      date: newEntry.date,
      weight: wVal,
      steps: newEntry.steps ? parseInt(newEntry.steps) : null,
      mood: newEntry.mood ? parseInt(newEntry.mood) : null,
      comment: newEntry.comment,
      id: Date.now(),
    };
    setEntries(function(prev) {
      return prev.filter(function(e) { return e.date !== entry.date; }).concat(entry)
        .sort(function(a, b) { return new Date(a.date) - new Date(b.date); });
    });
    const next = new Date(newEntry.date);
    next.setDate(next.getDate() + 1);
    setNewEntry({ date: next.toISOString().split('T')[0], weight: '', steps: '', mood: '', comment: '' });
    showToast('✓ Mätning sparad!');
  };
  const addWorkout = () => {
    if (!newWorkout.type || !newWorkout.duration) return;
    const workout = {
      date: newWorkout.date,
      type: newWorkout.type,
      duration: parseInt(newWorkout.duration),
      intensity: parseInt(newWorkout.intensity || 3),
      comment: newWorkout.comment,
      id: Date.now(),
    };
    setWorkouts(function(prev) {
      return prev.concat(workout).sort(function(a, b) { return new Date(a.date) - new Date(b.date); });
    });
    const next = new Date(newWorkout.date);
    next.setDate(next.getDate() + 1);
    setNewWorkout({ date: next.toISOString().split('T')[0], type: '', duration: '', intensity: '3', comment: '' });
    showToast('💪 Träningspass sparat!');
  };
  const deleteEntry   = function(id) { setEntries(function(prev) { return prev.filter(function(e) { return e.id !== id; }); }); };
  const deleteWorkout = function(id) { setWorkouts(function(prev) { return prev.filter(function(w) { return w.id !== id; }); }); };
  const editWorkout = function(w) {
    var nd = window.prompt('Minuter:', w.duration);
    if (nd === null) return;
    var v = parseInt(nd);
    if (isNaN(v) || v <= 0 || v > 600) { showToast('Ogiltig längd', 'error'); return; }
    setWorkouts(function(prev){ return prev.map(function(x){ return x.id === w.id ? Object.assign({}, x, { duration: v }) : x; }); });
    showToast('✓ Pass uppdaterat');
  };
  const getBodyBattery = function() { return Analytics.getBodyBattery(ouraData, workouts, dayLogs); };
  const editEntry = function(entry) {
    var nw = window.prompt('Ny vikt (kg):', entry.weight);
    if (nw === null) return;
    var v = parseFloat(String(nw).replace(',', '.'));
    if (isNaN(v) || v < 30 || v > 300) { showToast('Ogiltig vikt — ange 30–300 kg', 'error'); return; }
    setEntries(function(prev){ return prev.map(function(e){ return e.id === entry.id ? Object.assign({}, e, { weight: v }) : e; }); });
    showToast('✓ Vikt uppdaterad');
  };
  const exportData = () => {
    const data = { entries, workouts, goalWeight, height, yearlyGoal, targetRate, wegovyDoses, wegovyProtocol, experiments, checkups, exportDate: new Date().toISOString() };
    const blob  = new Blob([JSON.stringify(data, null, 2)], { type: 'application/json' });
    const url   = URL.createObjectURL(blob);
    const link  = document.createElement('a');
    link.href   = url;
    link.download = 'halsodagbok_' + todayStr() + '.json';
    document.body.appendChild(link);
    link.click();
    document.body.removeChild(link);
    URL.revokeObjectURL(url);
    var nowIso = new Date().toISOString();
    window.storage.set('last-backup', nowIso);
    setLastBackup(nowIso);
    showToast('💾 Backup nedladdad!');
  };
  const buildBackupObj = function() {

  function renderWegovy() {
    function saveDoses(doses) {
      setWegovyDoses(doses);

    function saveProtocol(proto) {
      setWegovyProtocol(proto);
      window.storage.set('wegovy-protocol', JSON.stringify(proto));
    }
    function toDateStr(d) {
      return d.getFullYear() + '-' + String(d.getMonth()+1).padStart(2,'0') + '-' + String(d.getDate()).padStart(2,'0');
    }
    function getNextTuesdayStr(fromDate) {
      var target = appSettings.injectionDay;
      var d = new Date(fromDate || Date.now());
      var diff = (target - d.getDay() + 7) % 7;
      if (diff === 0) diff = 7;
      d.setDate(d.getDate() + diff);
      return toDateStr(d);
    }
    function getWeeksOn(proto) {
      if (!proto) return 0;
      var ms = new Date() - new Date(proto.start_date);
      return Math.ceil(ms / (7*24*60*60*1000));
    }
    function getCurrentStepIdx(proto, weeks) {
      if (!proto) return 0;
      var plan = proto.titration_plan;
      for (var i = 0; i < plan.length; i++) {
        var r = plan[i].weeks;
        if (r.endsWith('+')) { if (weeks >= parseInt(r)) return i; }
        else { var p = r.split('-'); if (weeks >= parseInt(p[0]) && weeks <= parseInt(p[1])) return i; }
      }
      return plan.length - 1;
    }
    function getDoseStreak(doses) {
      if (!doses || !doses.length) return 0;
      var streak = 0;
      var d = new Date(); d.setHours(0,0,0,0);
      var back = (d.getDay() - appSettings.injectionDay + 7) % 7;
      d.setDate(d.getDate() - back);
      for (var i = 0; i < 52; i++) {
        var ds = toDateStr(d);
        if (doses.find(function(x){ return x.date === ds; })) { streak++; d.setDate(d.getDate()-7); }
        else break;
      }
      return streak;
    }

    if (wgovLoading || !wegovyDoses || !wegovyProtocol) {
      return h('div', { className: 'text-center py-12 text-gray-400' }, 'Laddar...');
    }

    var sortedDoses = wegovyDoses.slice().sort(function(a,b){ return new Date(b.date)-new Date(a.date); });
    var latestDose = sortedDoses[0] || null;
    var weeksOn = getWeeksOn(wegovyProtocol);
    var stepIdx = getCurrentStepIdx(wegovyProtocol, weeksOn);
    var currentStep = wegovyProtocol.titration_plan[stepIdx] || wegovyProtocol.titration_plan[0];
    var nextStep = wegovyProtocol.titration_plan[stepIdx + 1] || null;
    var streak = getDoseStreak(wegovyDoses);
    var today = new Date(); today.setHours(0,0,0,0);

    var nextTue = getNextTuesdayStr(today);
    while (wegovyDoses.find(function(d){ return d.date === nextTue; })) {
      var nt = new Date(nextTue); nt.setDate(nt.getDate()+7); nextTue = toDateStr(nt);

    var daysToNext = Math.round((new Date(nextTue) - today) / (24*60*60*1000));

    var firstDoseSorted = wegovyDoses.slice().sort(function(a,b){ return new Date(a.date)-new Date(b.date); });
    var weightAtStart = (firstDoseSorted[0] && firstDoseSorted[0].weight_at_dose) ? firstDoseSorted[0].weight_at_dose : null;
    var latestWeight = stats ? stats.latest.weight : null;
    var weightChange = (weightAtStart && latestWeight) ? (latestWeight - weightAtStart).toFixed(1) : null;
    var totalMg = wegovyDoses.reduce(function(s,d){ return s+(d.dose||0); }, 0).toFixed(2);

    var nextStepDate = null;
    if (nextStep) {

      if (!currentStep.weeks.endsWith('+')) {

      }
    }

    function openDoseForm() {

    function submitDose() {

    var wgStart = wegovyProtocol.start_date;
    var respEntries = wgStart ? entries.filter(function(e){return e.date>=wgStart;}).slice().sort(function(a,b){return new Date(a.date)-new Date(b.date);}) : [];
    var respData = respEntries.map(function(e){ return { datum:new Date(e.date).toLocaleDateString('sv-SE',{month:'short',day:'numeric'}), vikt:e.weight }; });
    var dosesAsc = wegovyDoses.slice().sort(function(a,b){return new Date(a.date)-new Date(b.date);});
    var escMarkers = []; var prevDoseVal = null;
    dosesAsc.forEach(function(d){ if(prevDoseVal!=null && d.dose>prevDoseVal){ var idx=-1; for(var i=0;i<respEntries.length;i++){ if(respEntries[i].date>=d.date){idx=i;break;} } if(idx>=0) escMarkers.push({i:idx, label:d.dose+'mg'}); } prevDoseVal=d.dose; });
    // ── Respons per dossteg + prognos ──
    var doseResponse = (function(){
      if (!dosesAsc.length || respEntries.length < 2) return null;

        if (es.length < 2) return { dose: p.dose, rate: null, weeks: null };
        var days = (new Date(es[es.length-1].date) - new Date(es[0].date)) / 86400000;

      });
      var recent = respEntries.filter(function(e){ return (new Date() - new Date(e.date)) <= 28*86400000; });
      var pace = null;

        var sl = (n*sxy - sx*sy) / ((n*sxx - sx*sx) || 1);

      if (!perStep.some(function(s){ return s.rate != null; }) && pace == null) return null;
      // Procentuell viktminskning + milstolpar
      var startW = respEntries[0].weight;
      var pctLoss = (startW - lastW) / startW * 100;
      var milestones = [5, 10, 15, 20].map(function(m){
        return { pct: m, kg: parseFloat((startW * m / 100).toFixed(1)), reached: pctLoss >= m };
      });
      var nextMs = milestones.find(function(m){ return !m.reached; }) || null;
      // Biverkningar per dosnivå
      var seByDose = {};
      dosesAsc.forEach(function(d){
        var k = d.dose;
        if (!seByDose[k]) seByDose[k] = { dose: k, total: 0, withSE: 0, effects: {} };
        seByDose[k].total++;
        if (d.side_effects && d.side_effects.trim()) { seByDose[k].withSE++; seByDose[k].effects[d.side_effects.trim().toLowerCase()] = true; }
      });
      var seRows = Object.values(seByDose).sort(function(a,b){ return a.dose - b.dose; });
      var anySE = seRows.some(function(r){ return r.withSE > 0; });
      // Typisk respons i kliniska studier (STEP 1, semaglutid 2.4 mg): interpolerad %-kurva
      var stepCurve = [[0,0],[4,2],[8,4],[12,6],[16,7.5],[20,9],[28,10.8],[36,12.4],[44,13.8],[52,14.5],[60,15],[68,15.3]];
      var typicalPct = null;
      var wk = getWeeksOn(wegovyProtocol);
      if (wk > 0) {
        var capped = Math.min(wk, 68);
        for (var si = 1; si < stepCurve.length; si++) {
          if (capped <= stepCurve[si][0]) {
            var a0 = stepCurve[si-1], a1 = stepCurve[si];

            break;

        }
        if (typicalPct == null) typicalPct = 15.3;
      }
      // Prognosgraf: historik + trendlinje till mål
      var chart = null;
      if (pace != null && pace < -0.02) {
        var fWeeks = Math.min(30, forecast ? forecast.weeks : 30);
        chart = respEntries.map(function(e, i){
          return { datum: new Date(e.date).toLocaleDateString('sv-SE',{month:'short',day:'numeric'}), vikt: e.weight, prognos: i === respEntries.length-1 ? e.weight : null, mål: goalWeight };
        });
        var lastD = new Date(respEntries[respEntries.length-1].date);
        for (var fk = 1; fk <= fWeeks; fk++) {
          var fD = new Date(lastD); fD.setDate(lastD.getDate() + fk*7);
          var fV = Math.max(goalWeight, lastW + pace*fk);
          chart.push({ datum: fD.toLocaleDateString('sv-SE',{month:'short',day:'numeric'}), vikt: null, prognos: parseFloat(fV.toFixed(1)), mål: goalWeight });
          if (fV <= goalWeight) break;
        }
      }
      return { perStep: perStep, forecast: forecast, pace: pace != null ? parseFloat(pace.toFixed(2)) : null, lastW: lastW,
        startW: startW, pctLoss: parseFloat(pctLoss.toFixed(1)), milestones: milestones, nextMs: nextMs,
        seRows: seRows, anySE: anySE, typicalPct: typicalPct != null ? parseFloat(typicalPct.toFixed(1)) : null, weeksOn: wk, chart: chart };
    })();
    // ── Takt över tid + signal vs brus ──
    var taktData = (function(){
      if (respEntries.length < 10) return null;
      var wkMap = {};
      respEntries.forEach(function(e){ var wk = getWeekNumber(e.date); (wkMap[wk] = wkMap[wk] || []).push(e.weight); });
      var wks = Object.keys(wkMap).sort();
      var bars = null;
      if (wks.length >= 3) {
        var avgs = wks.map(function(k){ var a = wkMap[k]; return a.reduce(function(x,y){ return x+y; },0)/a.length; });
        bars = [];
        for (var i = 1; i < wks.length; i++) {
          bars.push({ label: getISOWeekNumber(wks[i]), takt: parseFloat((avgs[i]-avgs[i-1]).toFixed(2)) });
        }
        bars = bars.slice(-16);
      }
      var diffs = [];
      for (var j = 1; j < respEntries.length; j++) {
        var dd = (new Date(respEntries[j].date) - new Date(respEntries[j-1].date)) / 86400000;
        if (dd === 1) diffs.push(respEntries[j].weight - respEntries[j-1].weight);
      }
      var noise = null;
      if (diffs.length >= 10) {
        var mu = diffs.reduce(function(a,b){ return a+b; },0)/diffs.length;
        var sd = Math.sqrt(diffs.reduce(function(s,v){ return s+Math.pow(v-mu,2); },0)/diffs.length);
        var within = diffs.filter(function(v){ return Math.abs(v - mu) <= sd; }).length;
        noise = { sd: parseFloat(sd.toFixed(2)), muWeek: parseFloat((mu*7).toFixed(2)), n: diffs.length, withinPct: Math.round(within/diffs.length*100) };
      }
      return (bars || noise) ? { bars: bars, noise: noise } : null;
    })();
    // ── Monte Carlo-prognos: bootstrap av dina egna veckoutfall ──
    var monteCarlo = (function(){
      if (respEntries.length < 14 || !stats) return null;
      var wkMap = {};
      respEntries.forEach(function(e){ var wk = getWeekNumber(e.date); (wkMap[wk] = wkMap[wk] || []).push(e.weight); });
      var wks = Object.keys(wkMap).sort();
      if (wks.length < 5) return null;
      var avgs = wks.map(function(k){ var a = wkMap[k]; return a.reduce(function(x,y){ return x+y; },0)/a.length; });
      var deltas = [];
      for (var i = 1; i < avgs.length; i++) deltas.push(avgs[i]-avgs[i-1]);
      deltas = deltas.slice(-12);
      if (deltas.length < 4) return null;
      var lastW = respEntries[respEntries.length-1].weight;
      if (lastW <= goalWeight) return null;
      var rnd = mulberry32(parseInt(todayStr.replace(/-/g,'')) || 42);
      var sims = 2000, horizon = 156, arrivals = [];
      for (var s = 0; s < sims; s++) {
        var w = lastW, t = null;
        for (var k = 1; k <= horizon; k++) {
          w += deltas[Math.floor(rnd()*deltas.length)];
          if (w <= goalWeight) { t = k; break; }
        }
        if (t != null) arrivals.push(t);
      }
      var pReach = arrivals.length/sims;
      if (!arrivals.length) return { pReach: 0, nDeltas: deltas.length };
      arrivals.sort(function(a,b){ return a-b; });
      var q = function(p){ return arrivals[Math.min(arrivals.length-1, Math.floor(p*arrivals.length))]; };
      var dt = function(wk){ var d = new Date(); d.setDate(d.getDate()+wk*7); return d.toLocaleDateString('sv-SE',{month:'long',year:'numeric'}); };
      return { pReach: Math.round(pReach*100), p50: q(0.5), d10: dt(q(0.1)), d50: dt(q(0.5)), d90: dt(q(0.9)), nDeltas: deltas.length };
    })();
    // ── Injektionscykeln: mönster per dag efter dos ──
    var cycleData = (function(){
      if (dosesAsc.length < 3) return null;
      var addDaysStr = function(ds, n){ var dd = new Date(ds); dd.setDate(dd.getDate()+n); return toDateStr(dd); };
      var wBD = {}, mBD = {}, sBD = {};
      entries.forEach(function(e){ wBD[e.date] = e.weight; if (e.mood) mBD[e.date] = e.mood; });
      ouraData.forEach(function(d){ if (d.sleep_score != null) sBD[d.date] = d.sleep_score; });
      var offsets = [];
      for (var o = 0; o < 7; o++) offsets.push({ o: o, dw: [], mood: [], sleep: [], aptit: [], illa: [] });

      var rows = offsets.map(function(x){ return { o: x.o, dw: avg(x.dw), nDw: x.dw.length, mood: avg(x.mood), sleep: avg(x.sleep), aptit: avg(x.aptit), illa: avg(x.illa) }; });
      if (!rows.some(function(r){ return r.dw != null && r.nDw >= 3; })) return null;

      var worstDay = withDw.length ? withDw.reduce(function(p,c){ return c.dw > p.dw ? c : p; }) : null;
      return { rows: rows, bestDay: bestDay, worstDay: worstDay, nDoses: dosesAsc.length };

              h('div', null,
                h('h1', { className: 'text-base font-bold text-gray-800 leading-tight' }, 'Hälsodagbok'),
                h('p', { className: 'text-xs text-gray-400' }, new Date().toLocaleDateString('sv-SE',{day:'numeric',month:'long'}))
              )
            ),
            stats ? h('div', { className: 'bg-indigo-50 rounded-xl px-3 py-2 mt-2' },
              h('p', { className: 'text-xs text-indigo-400 font-medium' }, 'Senaste mätning'),
              h('p', { className: 'text-lg font-black text-indigo-700 leading-tight' }, stats.latest.weight + ' kg'),
              h('p', { className: 'text-xs ' + (parseFloat(stats.diff) <= 0 ? 'text-green-500' : 'text-red-400') },
                (parseFloat(stats.diff) > 0 ? '▲ +' : '▼ ') + stats.diff + ' kg från förra')
            ) : null
          ),
          h('p', { className: 'text-xs font-bold text-gray-400 uppercase tracking-widest mb-2 px-1' }, 'Hälsa'),
          h('nav', { className: 'flex flex-col gap-0.5 mb-4' },
            allNav.filter(function(n){return n.group==='h';}).map(function(n){
              var active = view === n.id;
              return h('button', { key:n.id, onClick:function(){setView(n.id);},
                className:'text-left px-3 py-2.5 rounded-xl text-sm transition-colors w-full '+(active?'bg-indigo-50 text-indigo-700 font-bold border-l-4 border-indigo-500':'text-gray-600 hover:bg-gray-50 font-medium border-l-4 border-transparent') }, n.label);
            }),
            h('button', { onClick:function(){setShowImport(!showImport);},
              className:'text-left px-3 py-2.5 rounded-xl text-sm font-medium transition-colors w-full '+(showImport?'bg-indigo-50 text-indigo-700 font-bold border-l-4 border-indigo-500':'text-gray-600 hover:bg-gray-50 border-l-4 border-transparent') }, '💾 Backup')
          ),
        )
      ),
      h('main', { className: 'flex-1 md:ml-56 p-4 md:p-8 min-h-screen' },
        h('div', { className: 'max-w-screen-2xl mx-auto' },
          backupPanel,
          view === 'overview' ? renderOverview()  : null,
          view === 'insights' ? renderInsights()  : null,
          view === 'add'      ? renderAdd()       : null,
          view === 'workouts' ? renderWorkouts()  : null,
          view === 'history'  ? renderHistory()   : null,
          view === 'settings' ? renderSettings()  : null,
          view === 'oura'     ? renderOura()      : null,
          view === 'wegovy'   ? renderWegovy()    : null,
          view === 'checkups' ? renderCheckups()  : null
        )
      )
    )
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(h(WeightStepTracker, null));

</script>
  <script>if('serviceWorker' in navigator){window.addEventListener('load',function(){navigator.serviceWorker.register('sw.js').catch(function(){});});}</script>
</body>
</html>
