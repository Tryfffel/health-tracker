<!DOCTYPE html>
<html lang="sv">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Hälsodagbok</title>
  <meta name="theme-color" content="#4f46e5">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="default">
  <meta name="apple-mobile-web-app-title" content="Hälsodagbok">
  <link rel="manifest" href="manifest.json">
  <script src="https://unpkg.com/react@18/umd/react.production.min.js" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js" crossorigin="anonymous"></script>
  <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-100">
<div id="root"></div>


<script>
// localStorage polyfill matching the window.storage API
window.storage = {
  get: async (key) => ({ value: localStorage.getItem(key) }),
  set: async (key, value) => { localStorage.setItem(key, value); }
};
const h = React.createElement;
const { useState, useEffect } = React;
// ─── SVG Charts (no external library needed) ─────────────────────────────────
function SvgLineChart({ data, lines, height }) {
  height = height || 260;
  if (!data || data.length < 2) return h('p', {className:'text-gray-400 text-sm text-center py-8'}, 'Lägg till fler mätningar för att se grafen');
  var PL=50,PR=20,PT=20,PB=36,W=800,H=height;
  var chartW=W-PL-PR, chartH=H-PT-PB;
  var allVals=[];
  lines.forEach(function(l){ data.forEach(function(d){ if(d[l.key]!=null) allVals.push(d[l.key]); }); });
  var minV=Math.min.apply(null,allVals)-0.5, maxV=Math.max.apply(null,allVals)+0.5;
  var rng=maxV-minV||1;
  var tx=function(i){ return PL+(i/(data.length-1))*chartW; };
  var ty=function(v){ return PT+chartH-((v-minV)/rng)*chartH; };
  var gridEls=[];
  for(var gi=0;gi<=4;gi++){
    var gv=minV+(rng/4)*gi, gy=ty(gv);
    gridEls.push(h('line',{key:'g'+gi,x1:PL,y1:gy,x2:PL+chartW,y2:gy,stroke:'#f0f0f0',strokeWidth:1}));
    gridEls.push(h('text',{key:'gt'+gi,x:PL-4,y:gy+4,textAnchor:'end',fontSize:10,fill:'#9ca3af'},gv.toFixed(1)));
  }
  var nth=Math.max(1,Math.ceil(data.length/8));
  var xLabels=data.map(function(d,i){
    if(i%nth!==0&&i!==data.length-1) return null;
    return h('text',{key:'xl'+i,x:tx(i),y:PT+chartH+18,textAnchor:'middle',fontSize:9,fill:'#9ca3af'},d.datum);
  });
  var lineEls=lines.map(function(l){
    var pts=data.filter(function(d){return d[l.key]!=null;}).map(function(d,_,arr){
      var i=data.indexOf(d); return tx(i)+','+ty(d[l.key]);
    }).join(' ');
    return h('polyline',{key:l.key,points:pts,fill:'none',stroke:l.color,strokeWidth:l.width||1.5,strokeDasharray:l.dashed?'5,5':undefined});
  });
  var legendEls=lines.map(function(l,i){
    var lx=PL+i*140;
    return h('g',{key:'leg'+i},
      h('line',{x1:lx,y1:H-8,x2:lx+20,y2:H-8,stroke:l.color,strokeWidth:l.width||1.5,strokeDasharray:l.dashed?'5,5':undefined}),
      h('text',{x:lx+24,y:H-4,fontSize:10,fill:'#6b7280'},l.name)
    );
  });
  return h('svg',{viewBox:'0 0 '+W+' '+H,style:{width:'100%',height:height+'px'},xmlns:'http://www.w3.org/2000/svg'},
    h('line',{x1:PL,y1:PT,x2:PL,y2:PT+chartH,stroke:'#e5e7eb',strokeWidth:1}),
    h('line',{x1:PL,y1:PT+chartH,x2:PL+chartW,y2:PT+chartH,stroke:'#e5e7eb',strokeWidth:1}),
    ...gridEls, ...xLabels, ...lineEls, ...legendEls
  );
}
function SvgBarChart({ data, dataKey, color, height }) {
  height = height || 200;
  if (!data || data.length === 0) return null;
  var PL=50,PR=20,PT=20,PB=36,W=800,H=height;
  var chartW=W-PL-PR, chartH=H-PT-PB;
  var vals=data.map(function(d){return d[dataKey]||0;}), maxV=Math.max.apply(null,vals)||1;
  var bW=(chartW/data.length)*0.75;
  var bars=data.map(function(d,i){
    var v=d[dataKey]||0, bH=(v/maxV)*chartH;
    var bx=PL+(i/data.length)*chartW+(chartW/data.length)*0.125;
    return h('rect',{key:i,x:bx,y:PT+chartH-bH,width:bW,height:bH,fill:color,rx:2});
  });
  var nth=Math.max(1,Math.ceil(data.length/8));
  var xLabels=data.map(function(d,i){
    if(i%nth!==0&&i!==data.length-1) return null;
    var bx=PL+(i/data.length)*chartW+(chartW/data.length)*0.125+bW/2;
    return h('text',{key:'xl'+i,x:bx,y:PT+chartH+18,textAnchor:'middle',fontSize:9,fill:'#9ca3af'},d.datum);
  });
  var yLabels=[];
  for(var yi=0;yi<=4;yi++){
    var yv=Math.round((maxV/4)*yi), yyy=PT+chartH-(yi/4)*chartH;
    yLabels.push(h('text',{key:'y'+yi,x:PL-4,y:yyy+4,textAnchor:'end',fontSize:10,fill:'#9ca3af'},yv>=1000?Math.round(yv/1000)+'k':yv));
  }
  return h('svg',{viewBox:'0 0 '+W+' '+H,style:{width:'100%',height:height+'px'},xmlns:'http://www.w3.org/2000/svg'},
    h('line',{x1:PL,y1:PT+chartH,x2:PL+chartW,y2:PT+chartH,stroke:'#e5e7eb',strokeWidth:1}),
    ...[0,1,2,3,4].map(function(i){var gy=PT+chartH-(i/4)*chartH;return h('line',{key:'g'+i,x1:PL,y1:gy,x2:PL+chartW,y2:gy,stroke:'#f0f0f0',strokeWidth:1});}),
    ...yLabels, ...xLabels, ...bars
  );
}
// ─── Sub-components ──────────────────────────────────────────────────────────
const Toast = ({ toast, onClose }) => {
  if (!toast) return null;
  return h('div', {
    className: 'fixed top-4 right-4 z-50 px-5 py-3 rounded-xl shadow-lg text-white flex items-center gap-3 ' + (toast.type === 'error' ? 'bg-red-500' : 'bg-green-500')
  },
    h('span', { className: 'text-sm font-medium' }, toast.msg),
    h('button', { onClick: onClose, className: 'hover:opacity-70 text-lg leading-none ml-2' }, '×')
  );
};
const StatCard = ({ emoji, label, value, sub, subColor, accent, bg }) =>
  h('div', { className: 'bg-white rounded-xl p-4 shadow-md border-l-4 overflow-hidden relative ' + (accent || 'border-indigo-400') },
    h('div', { className: 'absolute -top-4 -right-4 w-20 h-20 rounded-full opacity-[0.08] ' + (bg || 'bg-indigo-500') }),
    h('div', { className: 'relative text-2xl mb-1' }, emoji),
    h('p', { className: 'relative text-xs text-gray-500 uppercase tracking-wide font-medium' }, label),
    h('p', { className: 'relative text-2xl font-bold text-gray-800 mt-1' }, value),
    sub ? h('p', { className: 'relative text-xs mt-1 ' + (subColor || 'text-gray-500') }, sub) : null
  );
const IntensityDots = ({ level }) =>
  h('span', { className: 'inline-flex gap-0.5 items-center' },
    ...[1,2,3,4,5].map(i =>
      h('span', { key: i, className: 'w-2 h-2 rounded-full ' + (i <= level ? 'bg-orange-400' : 'bg-gray-200') })
    )
  );
// ─── Main Component ───────────────────────────────────────────────────────────
function WeightStepTracker() {
  const todayStr = () => { var d = new Date(); return d.getFullYear()+'-'+String(d.getMonth()+1).padStart(2,'0')+'-'+String(d.getDate()).padStart(2,'0'); };
  const [entries, setEntries]       = useState([]);
  const [workouts, setWorkouts]     = useState([]);
  const [goalWeight, setGoalWeight]       = useState(85);
  const [targetRate, setTargetRate]       = useState(0.5);
  const [height, setHeight]               = useState(180);
  const [yearlyGoal, setYearlyGoal]       = useState({ sessions: 100, minutes: 5000 });
  const [newEntry, setNewEntry]     = useState({ date: todayStr(), weight: '', steps: '', mood: '', comment: '' });
  const [newWorkout, setNewWorkout] = useState({ date: todayStr(), type: '', duration: '', intensity: '3', comment: '' });
  const [view, setView]             = useState('overview');
  const [importText, setImportText] = useState('');
  const [showImport, setShowImport] = useState(false);
  const [toast, setToast]           = useState(null);
  const [loading, setLoading]       = useState(true);
  const showToast = (msg, type) => {
    setToast({ msg, type: type || 'success' });
    setTimeout(() => setToast(null), 3000);
  };


// ─── OURA INTEGRATION ──────────────────────────────────────────────────────
  const OURA_API = 'https://tryf-api.duckdns.org';
  const [ouraData, setOuraData] = useState([]);
  const [ouraLastSync, setOuraLastSync] = useState(null);
  const [ouraConnected, setOuraConnected] = useState(false);
  const [ouraSyncing, setOuraSyncing] = useState(false);

  useEffect(function() {
    // Load cached Oura data
    Promise.all([
      window.storage.get('oura-data'),
      window.storage.get('oura-last-sync'),
      window.storage.get('oura-connected')
    ]).then(function(r) {
      if (r[0] && r[0].value) setOuraData(JSON.parse(r[0].value));
      if (r[1] && r[1].value) setOuraLastSync(r[1].value);
      if (r[2] && r[2].value === 'true') setOuraConnected(true);
    });
  }, []);

  const fetchOuraData = function(silent) {
    return fetch('oura-data.json?t=' + Date.now())
      .then(function(r) { return r.json(); })
      .then(function(data) {
        if (!Array.isArray(data)) throw new Error('Bad response');
        setOuraData(data);
        var now = new Date().toISOString();
        setOuraLastSync(now);
        setOuraConnected(true);
        window.storage.set('oura-data', JSON.stringify(data));
        window.storage.set('oura-last-sync', now);
        window.storage.set('oura-connected', 'true');
        if (!silent) showToast('💍 Oura synkad — ' + data.length + ' dagar');
        return data;
      })
      .catch(function(err) {
        console.error('Oura fetch failed', err);
        if (!silent) showToast('Kunde inte synka Oura', 'error');
      });
  };

  const triggerOuraSync = function() {
    setOuraSyncing(true);
    fetchOuraData(false)
      .catch(function() { showToast('Sync misslyckades', 'error'); })
      .finally(function() { setOuraSyncing(false); });
  };

  // Auto-fetch on load if data is stale (>2h)
  useEffect(function() {
    if (loading) return;
    var lastSync = ouraLastSync ? new Date(ouraLastSync).getTime() : 0;
    var twoHoursAgo = Date.now() - 2 * 60 * 60 * 1000;
    if (lastSync < twoHoursAgo) {
      fetchOuraData(true);
    }
  }, [loading, ouraConnected]);

  // Helpers
  const ouraLatest = ouraData.length > 0 ? ouraData[0] : null;
  const ouraStats = (function() {
    if (ouraData.length < 7) return null;
    var recent = ouraData.slice(0, 7);
    var avg = function(key) {
      var vals = recent.map(function(d){return d[key];}).filter(function(v){return v!=null;});
      return vals.length ? vals.reduce(function(a,b){return a+b;},0) / vals.length : null;
    };
    return {
      avgSleepScore: avg('sleep_score'),
      avgReadiness: avg('dagsform_score'),
      avgHrv: avg('hrv_avg'),
      avgRestingHr: avg('resting_hr'),
      avgSleepMin: avg('total_sleep_min')
    };
  })();

  useEffect(() => { loadData(); }, []);
  useEffect(() => { if (!loading) saveData(); }, [entries, workouts, goalWeight, targetRate, yearlyGoal, height, loading]);

  // ─── WEGOVY STATE ────────────────────────────────────────────────────────
  const WEGOVY_DEFAULT_PROTOCOL = {
    start_date: '2026-04-28', current_dose: 0.25, weeks_per_step: 6,
    titration_plan: [
      { weeks: '1-6',  dose: 0.25 }, { weeks: '7-12', dose: 0.5  },
      { weeks: '13-18',dose: 1.0  }, { weeks: '19-24',dose: 1.7  },
      { weeks: '25+',  dose: 2.4  }
    ]
  };
  const WEGOVY_DEFAULT_DOSES = [
    { id: 1745798400000, date: '2026-04-28', dose: 0.25, side_effects: '', notes: '', weight_at_dose: null },
    { id: 1746403200000, date: '2026-05-05', dose: 0.25, side_effects: '', notes: '', weight_at_dose: null }
  ];
  const [wegovyDoses, setWegovyDoses] = useState(null);
  const [wegovyProtocol, setWegovyProtocol] = useState(null);
  const [wgovLoading, setWgovLoading] = useState(true);
  const [showDoseForm, setShowDoseForm] = useState(false);
  const [editProtocol, setEditProtocol] = useState(false);
  const [doseForm, setDoseForm] = useState({});

  useEffect(function() {
    Promise.all([
      window.storage.get('wegovy-doses'),
      window.storage.get('wegovy-protocol')
    ]).then(function(r) {
      setWegovyDoses((r[0] && r[0].value) ? JSON.parse(r[0].value) : WEGOVY_DEFAULT_DOSES);
      setWegovyProtocol((r[1] && r[1].value) ? JSON.parse(r[1].value) : WEGOVY_DEFAULT_PROTOCOL);
      setWgovLoading(false);
    });
  }, []);


  // Read URL params injected by iOS Shortcut: ?steps=8500&date=2026-02-25
  const loadData = async () => {
    try {
      const results = await Promise.all([
        window.storage.get('weight-entries'),
        window.storage.get('workouts'),
        window.storage.get('goal-weight'),
        window.storage.get('yearly-goal'),
        window.storage.get('user-height'),
        window.storage.get('target-rate'),
      ]);
      if (results[0] && results[0].value) setEntries(JSON.parse(results[0].value));
      if (results[1] && results[1].value) setWorkouts(JSON.parse(results[1].value));
      if (results[2] && results[2].value) setGoalWeight(parseFloat(results[2].value));
      if (results[3] && results[3].value) setYearlyGoal(JSON.parse(results[3].value));
      if (results[4] && results[4].value) setHeight(parseFloat(results[4].value));
      if (results[5] && results[5].value) setTargetRate(parseFloat(results[5].value));
    } catch (err) {
      console.log('Ingen sparad data', err);
    } finally {
      setLoading(false);
    }
  };
  const saveData = async () => {
    try {
      await Promise.all([
        window.storage.set('weight-entries', JSON.stringify(entries)),
        window.storage.set('workouts',       JSON.stringify(workouts)),
        window.storage.set('goal-weight',    goalWeight.toString()),
        window.storage.set('yearly-goal',    JSON.stringify(yearlyGoal)),
        window.storage.set('user-height',    height.toString()),
        window.storage.set('target-rate',    targetRate.toString()),
      ]);
    } catch (err) { console.error(err); }
  };

  const addEntry = () => {
    if (!newEntry.weight) return;
    const entry = {
      date: newEntry.date,
      weight: parseFloat(newEntry.weight),
      steps: newEntry.steps ? parseInt(newEntry.steps) : null,
      mood: newEntry.mood ? parseInt(newEntry.mood) : null,
      comment: newEntry.comment,
      id: Date.now(),
    };
    setEntries(function(prev) {
      return prev.filter(function(e) { return e.date !== entry.date; }).concat(entry)
        .sort(function(a, b) { return new Date(a.date) - new Date(b.date); });
    });
    const next = new Date(newEntry.date);
    next.setDate(next.getDate() + 1);
    setNewEntry({ date: next.toISOString().split('T')[0], weight: '', steps: '', mood: '', comment: '' });
    showToast('✓ Mätning sparad!');
  };
  const addWorkout = () => {
    if (!newWorkout.type || !newWorkout.duration) return;
    const workout = {
      date: newWorkout.date,
      type: newWorkout.type,
      duration: parseInt(newWorkout.duration),
      intensity: parseInt(newWorkout.intensity || 3),
      comment: newWorkout.comment,
      id: Date.now(),
    };
    setWorkouts(function(prev) {
      return prev.concat(workout).sort(function(a, b) { return new Date(a.date) - new Date(b.date); });
    });
    const next = new Date(newWorkout.date);
    next.setDate(next.getDate() + 1);
    setNewWorkout({ date: next.toISOString().split('T')[0], type: '', duration: '', intensity: '3', comment: '' });
    showToast('💪 Träningspass sparat!');
  };
  const deleteEntry   = function(id) { setEntries(function(prev) { return prev.filter(function(e) { return e.id !== id; }); }); };
  const deleteWorkout = function(id) { setWorkouts(function(prev) { return prev.filter(function(w) { return w.id !== id; }); }); };
  const exportData = () => {
    const data = { entries, workouts, goalWeight, height, yearlyGoal, exportDate: new Date().toISOString() };
    const blob  = new Blob([JSON.stringify(data, null, 2)], { type: 'application/json' });
    const url   = URL.createObjectURL(blob);
    const link  = document.createElement('a');
    link.href   = url;
    link.download = 'halsodagbok_' + todayStr() + '.json';
    document.body.appendChild(link);
    link.click();
    document.body.removeChild(link);
    URL.revokeObjectURL(url);
    showToast('💾 Backup nedladdad!');
  };
  const importFromFile = function(event) {
    const file = event.target.files[0];
    if (!file) return;
    const reader = new FileReader();
    reader.onload = function(e) {
      try {
        const data = JSON.parse(e.target.result);
        if (data.entries)    setEntries(data.entries);
        if (data.workouts)   setWorkouts(data.workouts);
        if (data.goalWeight) setGoalWeight(data.goalWeight);
        if (data.yearlyGoal) setYearlyGoal(data.yearlyGoal);
        if (data.height)     setHeight(data.height);
        showToast('✓ Data importerad!');
        setShowImport(false);
        setView('overview');
      } catch(err) { showToast('Kunde inte läsa filen', 'error'); }
    };
    reader.readAsText(file);
  };
  const importHistoricalData = () => {
    const lines = importText.trim().split('\n');
    const imported = [];
    const months = { jan:'01',feb:'02',mar:'03',apr:'04',maj:'05',jun:'06',jul:'07',aug:'08',sep:'09',okt:'10',nov:'11',dec:'12' };
    for (let i = 0; i < lines.length; i++) {
      let line = lines[i].trim();
      if (!line) continue;
      const parts = line.split(/[\t\s]+/).filter(function(p) { return p; });
      if (parts.length >= 2) {
        const match = parts[0].match(/(\d+)-(\w+)/);
        if (match) {
          const day   = match[1].length === 1 ? '0' + match[1] : match[1];
          const month = months[match[2].toLowerCase()];
          if (month) {
            const weight = parseFloat(parts[1].replace(',', '.'));
            if (!isNaN(weight)) {
              imported.push({ date: '2025-' + month + '-' + day, weight: weight, steps: null, comment: '', id: Date.now() + imported.length + Math.random() });
            }
          }
        }
      }
    }
    if (imported.length > 0) {
      const combined = entries.concat(imported);
      const map = {};
      combined.forEach(function(e) { map[e.date] = e; });
      const unique = Object.values(map).sort(function(a,b) { return new Date(a.date) - new Date(b.date); });
      setEntries(unique);
      setImportText(''); setShowImport(false); setView('overview');
      showToast('✓ Importerade ' + imported.length + ' mätningar!');
    } else { showToast('Ingen giltig data hittades', 'error'); }
  };
  const getBMI = function(weight) {
    if (!height || !weight) return null;
    const hm = height / 100;
    return parseFloat((weight / (hm * hm)).toFixed(1));
  };
  const getBMICategory = function(bmi) {
    if (bmi < 18.5) return { label: 'Undervikt',  color: 'text-blue-600' };
    if (bmi < 25)   return { label: 'Normalvikt', color: 'text-green-600' };
    if (bmi < 30)   return { label: 'Övervikt',   color: 'text-yellow-600' };
    return             { label: 'Fetma',       color: 'text-red-600' };
  };
  const getStreak = function() {
    if (entries.length === 0) return 0;
    const sorted = entries.slice().sort(function(a,b) { return new Date(b.date) - new Date(a.date); });
    const todayD  = new Date(); todayD.setHours(0,0,0,0);
    const latestD = new Date(sorted[0].date); latestD.setHours(0,0,0,0);
    if ((todayD - latestD) / 86400000 > 1) return 0;
    let streak = 1;
    let prev = new Date(sorted[0].date); prev.setHours(0,0,0,0);
    for (let i = 1; i < sorted.length; i++) {
      const d = new Date(sorted[i].date); d.setHours(0,0,0,0);
      if ((prev - d) / 86400000 === 1) { streak++; prev = d; } else break;
    }
    return streak;
  };
  const getCalories = function(type, duration, weight) {
    weight = weight || 80;
    const mets = { 'Styrketräning':5,'Löpning':9,'Promenad':3.5,'Cykling':7,'Simning':7,'Yoga':2.5,'Pilates':3,'Fotboll':7,'Tennis':7,'Golf':4,'Skidåkning':7,'Innebandy':8,'Dans':5,'Boxning':9,'Klättring':8,'Crossfit':10,'Spinning':8,'Gruppträning':6,'Baseboll':4,'Annat':5 };
    return Math.round((mets[type] || 5) * weight * (duration / 60));
  };
  const getWeekNumber = function(date) {
    const d = new Date(date);
    const diff = d.getDate() - d.getDay() + (d.getDay() === 0 ? -6 : 1);
    const monday = new Date(d.setDate(diff));
    monday.setHours(0,0,0,0);
    return monday.toISOString().split('T')[0];
  };
  const getISOWeekNumber = function(date) {
    const d = new Date(date);
    d.setHours(0,0,0,0);
    d.setDate(d.getDate() + 4 - (d.getDay() || 7));
    const yearStart = new Date(d.getFullYear(), 0, 1);
    return 'V' + Math.ceil((((d - yearStart) / 86400000) + 1) / 7);
  };
  const getWeeklyStats = function() {
    if (entries.length === 0) return [];
    const sorted = entries.slice().sort(function(a,b) { return new Date(a.date) - new Date(b.date); });
    const weekMap = {};
    sorted.forEach(function(entry) {
      const ws = getWeekNumber(entry.date);
      if (!weekMap[ws]) weekMap[ws] = { weekStart: ws, weights: [], steps: [] };
      weekMap[ws].weights.push(entry.weight);
      if (entry.steps) weekMap[ws].steps.push(entry.steps);
    });
    const weeks = Object.values(weekMap).map(function(week) {
      const avgWeight = week.weights.reduce(function(a,b){return a+b;},0) / week.weights.length;
      const avgSteps  = week.steps.length ? Math.round(week.steps.reduce(function(a,b){return a+b;},0) / week.steps.length) : 0;
      const weekWorkouts = workouts.filter(function(w) { return getWeekNumber(w.date) === week.weekStart; });
      return {
        weekStart: week.weekStart, weekNumber: getISOWeekNumber(week.weekStart),
        avgWeight: parseFloat(avgWeight.toFixed(1)),
        avgSteps: avgSteps,
        workoutCount: weekWorkouts.length,
        totalMinutes: weekWorkouts.reduce(function(s,w){return s+w.duration;},0),
        change: 0,
      };
    });
    for (let i = 1; i < weeks.length; i++) {
      weeks[i].change = parseFloat((weeks[i].avgWeight - weeks[i-1].avgWeight).toFixed(2));
    }
    return weeks.sort(function(a,b) { return new Date(b.weekStart) - new Date(a.weekStart); });
  };
  const getCurrentWeekStats = function() {
    const ws = getWeeklyStats();
    if (!ws.length) return null;
    return { thisWeek: ws[0], lastWeek: ws[1] || null };
  };
  const getYearlyProgress = function() {
    const yr = new Date().getFullYear();
    const yearWorkouts = workouts.filter(function(w) { return new Date(w.date).getFullYear() === yr; });
    const totalSessions = yearWorkouts.length;
    const totalMinutes  = yearWorkouts.reduce(function(s,w){return s+w.duration;},0);
    const weeksElapsed  = Math.floor((new Date() - new Date(yr, 0, 1)) / (7*24*60*60*1000)) + 1;
    const expectedSessions = Math.round((yearlyGoal.sessions / 52) * weeksElapsed);
    const expectedMinutes  = Math.round((yearlyGoal.minutes  / 52) * weeksElapsed);
    return {
      totalSessions: totalSessions, totalMinutes: totalMinutes,
      goalSessions: yearlyGoal.sessions, goalMinutes: yearlyGoal.minutes,
      sessionsProgress: Math.min(totalSessions / yearlyGoal.sessions * 100, 100).toFixed(1),
      minutesProgress:  Math.min(totalMinutes  / yearlyGoal.minutes  * 100, 100).toFixed(1),
      onTrackSessions: totalSessions >= expectedSessions,
      onTrackMinutes:  totalMinutes  >= expectedMinutes,
      aheadSessions: totalSessions - expectedSessions,
      aheadMinutes:  totalMinutes  - expectedMinutes,
    };
  };
  const getStats = function() {
    if (entries.length === 0) return null;
    const sorted    = entries.slice().sort(function(a,b){return new Date(a.date)-new Date(b.date);});
    const latest    = sorted[sorted.length - 1];
    const previous  = sorted[sorted.length - 2];
    const diff      = previous ? (latest.weight - previous.weight).toFixed(1) : 0;
    const toGoal    = (latest.weight - goalWeight).toFixed(1);
    const totalLoss = (sorted[0].weight - latest.weight).toFixed(1);
    const recentSteps = sorted.slice(-7).filter(function(e){return e.steps;}).map(function(e){return e.steps;});
    const avgSteps  = recentSteps.length ? Math.round(recentSteps.reduce(function(a,b){return a+b;},0) / recentSteps.length) : 0;
    const bmi    = getBMI(latest.weight);
    const bmiCat = bmi ? getBMICategory(bmi) : null;
    return { latest: latest, diff: diff, toGoal: toGoal, totalLoss: totalLoss, avgSteps: avgSteps, bmi: bmi, bmiCat: bmiCat, streak: getStreak() };
  };
  const getPrediction = function() {
    if (entries.length < 7) return null;
    const sorted = entries.slice().sort(function(a,b){return new Date(a.date)-new Date(b.date);});
    const recent = sorted.slice(-30);
    if (recent.length < 5) return null;
    var n = recent.length, sumX=0, sumY=0, sumXY=0, sumX2=0;
    var t0 = new Date(recent[0].date).getTime();
    recent.forEach(function(e) {
      var x = (new Date(e.date).getTime()-t0)/86400000, y = e.weight;
      sumX+=x; sumY+=y; sumXY+=x*y; sumX2+=x*x;
    });
    var slope = (n*sumXY - sumX*sumY) / (n*sumX2 - sumX*sumX);
    var intercept = (sumY - slope*sumX) / n;
    if (slope >= 0) return { gaining: true, kgPerWeek: parseFloat((slope*7).toFixed(2)) };
    var currentX = (new Date(recent[recent.length-1].date).getTime()-t0)/86400000;
    var daysToGoal = (goalWeight - intercept)/slope - currentX;
    if (daysToGoal < 0 || daysToGoal > 365*3) return null;
    return { weeksToGoal: Math.round(daysToGoal/7), kgPerWeek: parseFloat(Math.abs(slope*7).toFixed(2)), gaining: false };
  };
  const getMonthlySummary = function() {
    var now = new Date();
    var pad = function(n){ return String(n).padStart(2,'0'); };
    var tryMonth = function(yr, mo) { return yr + '-' + pad(mo+1); };
    var monthStr = tryMonth(now.getFullYear(), now.getMonth());
    var mEntries = entries.filter(function(e){ return e.date.startsWith(monthStr); });
    if (mEntries.length < 2) {
      var prev = new Date(now.getFullYear(), now.getMonth()-1, 1);
      monthStr = tryMonth(prev.getFullYear(), prev.getMonth());
      mEntries = entries.filter(function(e){ return e.date.startsWith(monthStr); });
    }
    if (mEntries.length === 0) return null;
    var mWorkouts = workouts.filter(function(w){ return w.date.startsWith(monthStr); });
    var sorted = mEntries.slice().sort(function(a,b){return new Date(a.date)-new Date(b.date);});
    var weightChange = sorted.length>1 ? parseFloat((sorted[sorted.length-1].weight - sorted[0].weight).toFixed(1)) : 0;
    var stepsArr = mEntries.filter(function(e){return e.steps;}).map(function(e){return e.steps;});
    var avgSteps = stepsArr.length ? Math.round(stepsArr.reduce(function(a,b){return a+b;},0)/stepsArr.length) : 0;
    var moodArr = mEntries.filter(function(e){return e.mood;}).map(function(e){return e.mood;});
    var avgMood = moodArr.length ? parseFloat((moodArr.reduce(function(a,b){return a+b;},0)/moodArr.length).toFixed(1)) : null;
    var names = ['januari','februari','mars','april','maj','juni','juli','augusti','september','oktober','november','december'];
    var moIdx = parseInt(monthStr.split('-')[1])-1;
    return { monthName: names[moIdx], weightChange, workoutCount: mWorkouts.length,
      totalMinutes: mWorkouts.reduce(function(s,w){return s+w.duration;},0),
      avgSteps, avgMood, logCount: mEntries.length };
  };
  // ── ALGORITHM: Plateau Detection ─────────────────────────────────────────────
  // Identifies when weight has been stuck for 2+ weeks (range < 0.8 kg, stdDev < 0.3)
  const getPlateauDetection = function() {
    if (entries.length < 7) return null;
    var sorted = entries.slice().sort(function(a,b){return new Date(a.date)-new Date(b.date);});
    var recent = sorted.slice(-14);
    if (recent.length < 5) return null;
    var weights = recent.map(function(e){return e.weight;});
    var mn = Math.min.apply(null,weights), mx = Math.max.apply(null,weights);
    var range = mx - mn;
    var avgW = weights.reduce(function(s,v){return s+v;},0)/weights.length;
    var variance = weights.reduce(function(s,v){return s+Math.pow(v-avgW,2);},0)/weights.length;
    var stdDev = Math.sqrt(variance);
    if (range >= 0.8 || stdDev >= 0.3) return null;
    // Also check that it's not already at goal
    if (avgW <= goalWeight + 0.5) return null;
    return { range: parseFloat(range.toFixed(1)), days: recent.length, avgWeight: parseFloat(avgW.toFixed(1)) };
  };
  // ── ALGORITHM: Workout ↔ Weight Correlation ───────────────────────────────────
  // Pearson correlation: does more workouts per week → more weight loss?
  const getWorkoutCorrelation = function() {
    var ws = getWeeklyStats().slice().reverse().slice(0, 12);
    if (ws.length < 4) return null;
    var validWeeks = ws.filter(function(w){ return w.change !== 0; });
    if (validWeeks.length < 4) return null;
    var n = validWeeks.length;
    var x = validWeeks.map(function(w){ return w.workoutCount; });
    var y = validWeeks.map(function(w){ return w.change; }); // negative = loss
    var meanX = x.reduce(function(s,v){return s+v;},0)/n;
    var meanY = y.reduce(function(s,v){return s+v;},0)/n;
    var num=0, denX=0, denY=0;
    for(var ci=0;ci<n;ci++){ num+=(x[ci]-meanX)*(y[ci]-meanY); denX+=Math.pow(x[ci]-meanX,2); denY+=Math.pow(y[ci]-meanY,2); }
    var corr = (denX*denY)>0 ? num/Math.sqrt(denX*denY) : 0;
    var activeWeeks  = validWeeks.filter(function(w){ return w.workoutCount >= 3; });
    var inactiveWeeks = validWeeks.filter(function(w){ return w.workoutCount < 2; });
    return {
      correlation: parseFloat(corr.toFixed(2)),
      activeAvg:   activeWeeks.length   ? parseFloat((activeWeeks.reduce(function(s,w){return s+w.change;},0)/activeWeeks.length).toFixed(2))   : null,
      inactiveAvg: inactiveWeeks.length ? parseFloat((inactiveWeeks.reduce(function(s,w){return s+w.change;},0)/inactiveWeeks.length).toFixed(2)) : null,
      activeCount: activeWeeks.length, inactiveCount: inactiveWeeks.length,
      weeksAnalyzed: n
    };
  };
  const getChartData = function() {
    const sorted = entries.slice().sort(function(a,b){return new Date(a.date)-new Date(b.date);});
    return sorted.map(function(entry, idx) {
      const w7 = sorted.slice(Math.max(0, idx - 6), idx + 1);
      return {
        datum:   new Date(entry.date).toLocaleDateString('sv-SE', { month: 'short', day: 'numeric' }),
        vikt:    entry.weight,
        steg:    entry.steps || 0,
        humör:   entry.mood || null,
        bmi:     getBMI(entry.weight),
        målvikt: goalWeight,
        snitt7:  parseFloat((w7.reduce(function(s,e){return s+e.weight;},0) / w7.length).toFixed(2)),
      };
    });
  };
  const stats          = getStats();
  const weeklyStats    = getWeeklyStats();
  const currentWeek    = getCurrentWeekStats();
  const yearProgress   = getYearlyProgress();
  const chartData      = getChartData();

  const getWeeklyReport = function() {
    if (entries.length < 2) return null;
    var now = new Date(); now.setHours(0,0,0,0);
    var dow = now.getDay();
    var monday = new Date(now); monday.setDate(now.getDate() - (dow===0?6:dow-1));
    var lastMon = new Date(monday); lastMon.setDate(monday.getDate()-7);
    var lastSun = new Date(monday); lastSun.setDate(monday.getDate()-1);
    var lastWeekEntries = entries.filter(function(e){
      var d=new Date(e.date); return d>=lastMon && d<=lastSun;
    });
    if (lastWeekEntries.length < 2) return null;
    var weights = lastWeekEntries.map(function(e){return e.weight;}).sort(function(a,b){return a-b;});
    var avgW = (weights.reduce(function(s,v){return s+v;},0)/weights.length).toFixed(1);
    var change = (lastWeekEntries[lastWeekEntries.length-1].weight - lastWeekEntries[0].weight).toFixed(1);
    var lastWeekWorkouts = workouts.filter(function(w){
      var d=new Date(w.date); return d>=lastMon && d<=lastSun;
    });
    var totalMin = lastWeekWorkouts.reduce(function(s,w){return s+w.duration;},0);
    var steps = lastWeekEntries.filter(function(e){return e.steps;});
    var avgSteps = steps.length ? Math.round(steps.reduce(function(s,e){return s+e.steps;},0)/steps.length) : 0;
    return {
      weekLabel: lastMon.toLocaleDateString('sv-SE',{month:'short',day:'numeric'}) + '–' + lastSun.toLocaleDateString('sv-SE',{month:'short',day:'numeric'}),
      avgW: avgW, change: parseFloat(change),
      workouts: lastWeekWorkouts.length, totalMin: totalMin,

  const getInsights = function() {
    if (entries.length < 7) return [];
    var insights = [];
    var sorted = entries.slice().sort(function(a,b){return new Date(a.date)-new Date(b.date);});

    // Best day of week for weight loss
    var dayDiffs = {};
    for (var i = 1; i < sorted.length; i++) {
      var prev = sorted[i-1], cur = sorted[i];
      var diff = cur.weight - prev.weight;
      var day = new Date(cur.date).getDay();
      if (!dayDiffs[day]) dayDiffs[day] = [];
      dayDiffs[day].push(diff);
    }
    var dayNames = ['söndag','måndag','tisdag','onsdag','torsdag','fredag','lördag'];
    var bestDay = null, bestAvg = 0;
    Object.keys(dayDiffs).forEach(function(d) {
      var avg = dayDiffs[d].reduce(function(s,v){return s+v;},0)/dayDiffs[d].length;
      if (bestDay === null || avg < bestAvg) { bestDay = parseInt(d); bestAvg = avg; }
    });
    if (bestDay !== null && bestAvg < -0.05) {
      insights.push({ icon:'📅', text: 'Du tappar mest vikt på ' + dayNames[bestDay] + 'ar (snitt ' + bestAvg.toFixed(2) + ' kg)' });
    }

    // Steps vs weight correlation
    var stepsEntries = sorted.filter(function(e){return e.steps && e.steps > 0;});
    if (stepsEntries.length >= 5) {
      var highSteps = stepsEntries.filter(function(e){return e.steps >= 8000;});
      var lowSteps  = stepsEntries.filter(function(e){return e.steps < 8000;});
      if (highSteps.length >= 3 && lowSteps.length >= 3) {
        var avgHigh = highSteps.reduce(function(s,e){return s+e.weight;},0)/highSteps.length;
        var avgLow  = lowSteps.reduce(function(s,e){return s+e.weight;},0)/lowSteps.length;
        if (avgHigh < avgLow - 0.3) {

        }
      }
    }

    // Workout weeks vs non-workout weeks
    if (workouts.length >= 4) {
      var weekMap = {};
      workouts.forEach(function(w){
        var wk = w.date.slice(0,7) + '-W' + getWeekNumber(new Date(w.date));
        weekMap[wk] = (weekMap[wk]||0) + 1;
      });
      var activeWeeks = Object.keys(weekMap).filter(function(w){return weekMap[w]>=3;});
      if (activeWeeks.length >= 2) {
        var eightWeeksAgo = new Date(); eightWeeksAgo.setDate(eightWeeksAgo.getDate() - 56);
        var recentWos = workouts.filter(function(w){return new Date(w.date) >= eightWeeksAgo;});
        var recentWkMap = {};
        recentWos.forEach(function(w){ var wk = w.date.slice(0,7)+'-W'+getWeekNumber(new Date(w.date)); recentWkMap[wk]=(recentWkMap[wk]||0)+1; });
        var recentAvg = (recentWos.length / Math.max(1, Object.keys(recentWkMap).length)).toFixed(1);
        insights.push({ icon:'💪', text: 'Veckor med 3+ träningspass: bättre viktprogress. Ditt snitt: ' + recentAvg + ' pass/vecka (senaste 8v)' });
      }
    }

    // Trend last 14 days
    if (sorted.length >= 14) {
      var last14 = sorted.slice(-14);
      var first14w = last14[0].weight, last14w = last14[last14.length-1].weight;
      var rate14 = (last14w - first14w) / 2;
      if (Math.abs(rate14) > 0.05) {
        var dir = rate14 < 0 ? '↓ minskar' : '↑ ökar';
        insights.push({ icon:'📈', text: 'Senaste 2 veckorna: trend ' + dir + ' med ' + Math.abs(rate14).toFixed(2) + ' kg/vecka' });
      }
    }

    // Best weight ever
    var minW = Math.min.apply(null, sorted.map(function(e){return e.weight;}));
    var minEntry = sorted.find(function(e){return e.weight===minW;});
    var latest = sorted[sorted.length-1];
    if (latest.weight - minW > 0.5) {
      insights.push({ icon:'🏆', text: 'Lägsta vikt: ' + minW + ' kg (' + new Date(minEntry.date).toLocaleDateString('sv-SE',{month:'short',day:'numeric'}) + '). Nu ' + (latest.weight-minW).toFixed(1) + ' kg därifrån' });
    }

    // Best week (biggest single-week drop)
    if (weeklyStats.length > 1) {
      var bestWeekData = weeklyStats.slice().sort(function(a,b){return a.change-b.change;})[0];
      if (bestWeekData && bestWeekData.change < -0.3) {
        insights.push({ icon:'📅', text: 'Bästa veckan: ' + bestWeekData.weekNumber + ' med ' + bestWeekData.change + ' kg (' + bestWeekData.workoutCount + ' träningspass)' });
      }
    }

    // Logging consistency
    if (sorted.length >= 14) {
      var firstDate = new Date(sorted[0].date), lastDate = new Date(sorted[sorted.length-1].date);
      var totalDays = Math.round((lastDate - firstDate) / 86400000) + 1;
      var logRate = Math.round(sorted.length / totalDays * 100);
      if (logRate >= 80) {
        insights.push({ icon:'🎯', text: 'Du loggar ' + logRate + '% av dagarna — utmärkt konsekvens!' });
      }
    }

    // Overall journey rate
    if (sorted.length >= 14) {
      var jDays = Math.round((new Date(sorted[sorted.length-1].date) - new Date(sorted[0].date)) / 86400000);
      var totalChange = sorted[sorted.length-1].weight - sorted[0].weight;

      }
    }

    return insights;
  };

  const weeklyReport = getWeeklyReport();
  const insights = getInsights();
  const monthlySummary = getMonthlySummary();
  const plateau = getPlateauDetection();
  const workoutCorr = getWorkoutCorrelation();

  function renderWegovy() {
    function saveDoses(doses) {
      setWegovyDoses(doses);
      window.storage.set('wegovy-doses', JSON.stringify(doses));
    }
    function saveProtocol(proto) {
      setWegovyProtocol(proto);
      window.storage.set('wegovy-protocol', JSON.stringify(proto));
    }
    function toDateStr(d) {
      return d.getFullYear() + '-' + String(d.getMonth()+1).padStart(2,'0') + '-' + String(d.getDate()).padStart(2,'0');
    }
    function getNextTuesdayStr(fromDate) {
      var d = new Date(fromDate || Date.now());
      var day = d.getDay();
      var diff = (day <= 2) ? (2 - day) : (9 - day);
      if (diff === 0) diff = 7;
      d.setDate(d.getDate() + diff);
      return toDateStr(d);
    }
    function getWeeksOn(proto) {
      if (!proto) return 0;
      var ms = new Date() - new Date(proto.start_date);
      return Math.ceil(ms / (7*24*60*60*1000));
    }
    function getCurrentStepIdx(proto, weeks) {
      if (!proto) return 0;
      var plan = proto.titration_plan;
      for (var i = 0; i < plan.length; i++) {
        var r = plan[i].weeks;
        if (r.endsWith('+')) { if (weeks >= parseInt(r)) return i; }
        else { var p = r.split('-'); if (weeks >= parseInt(p[0]) && weeks <= parseInt(p[1])) return i; }
      }
      return plan.length - 1;
    }
    function getDoseStreak(doses) {
      if (!doses || !doses.length) return 0;
      var streak = 0;
      var d = new Date(); d.setHours(0,0,0,0);
      var dow = d.getDay();
      d.setDate(d.getDate() - ((dow >= 2) ? dow - 2 : dow + 5));
      for (var i = 0; i < 52; i++) {
        var ds = toDateStr(d);
        if (doses.find(function(x){ return x.date === ds; })) { streak++; d.setDate(d.getDate()-7); }
        else break;
      }
      return streak;
    }

    if (wgovLoading || !wegovyDoses || !wegovyProtocol) {
      return h('div', { className: 'text-center py-12 text-gray-400' }, 'Laddar...');
    }

    var sortedDoses = wegovyDoses.slice().sort(function(a,b){ return new Date(b.date)-new Date(a.date); });
    var latestDose = sortedDoses[0] || null;
    var weeksOn = getWeeksOn(wegovyProtocol);
    var stepIdx = getCurrentStepIdx(wegovyProtocol, weeksOn);
    var currentStep = wegovyProtocol.titration_plan[stepIdx] || wegovyProtocol.titration_plan[0];
    var nextStep = wegovyProtocol.titration_plan[stepIdx + 1] || null;
    var streak = getDoseStreak(wegovyDoses);
    var today = new Date(); today.setHours(0,0,0,0);
    var todayStr = toDateStr(today);

    var nextTue = getNextTuesdayStr(today);
    while (wegovyDoses.find(function(d){ return d.date === nextTue; })) {
      var nt = new Date(nextTue); nt.setDate(nt.getDate()+7); nextTue = toDateStr(nt);
    }
    var daysToNext = Math.round((new Date(nextTue) - today) / (24*60*60*1000));
    var daysSinceLast = latestDose ? Math.round((today - new Date(latestDose.date)) / (24*60*60*1000)) : null;

    var firstDoseSorted = wegovyDoses.slice().sort(function(a,b){ return new Date(a.date)-new Date(b.date); });
    var weightAtStart = (firstDoseSorted[0] && firstDoseSorted[0].weight_at_dose) ? firstDoseSorted[0].weight_at_dose : null;
    var latestWeight = stats ? stats.latest.weight : null;
    var weightChange = (weightAtStart && latestWeight) ? (latestWeight - weightAtStart).toFixed(1) : null;
    var totalMg = wegovyDoses.reduce(function(s,d){ return s+(d.dose||0); }, 0).toFixed(2);

    var nextStepDate = null;
    if (nextStep) {
      var endWeek = parseInt(currentStep.weeks.endsWith('+') ? '999' : currentStep.weeks.split('-')[1]);
      if (!currentStep.weeks.endsWith('+')) {
        var ns = new Date(wegovyProtocol.start_date);
        ns.setDate(ns.getDate() + endWeek * 7);
        nextStepDate = ns;
      }
    }

    function openDoseForm() {
      setDoseForm({ date: nextTue, dose: wegovyProtocol.current_dose, side_effects: '', notes: '', weight_at_dose: stats ? stats.latest.weight : '' });
      setShowDoseForm(true);
    }
    function submitDose() {
      if (!doseForm.date || !doseForm.dose) return;
      saveDoses(wegovyDoses.concat([{ id: Date.now(), date: doseForm.date, dose: parseFloat(doseForm.dose), side_effects: doseForm.side_effects||'', notes: doseForm.notes||'', weight_at_dose: doseForm.weight_at_dose ? parseFloat(doseForm.weight_at_dose) : null }]));
      setShowDoseForm(false);
      showToast('💉 Dos loggad!');
    }

    return h('div', null,
      h('div', { className: 'bg-gradient-to-br from-pink-500 via-purple-500 to-indigo-600 rounded-2xl shadow-xl mb-5 p-6 text-white' },
        h('div', { className: 'flex items-start justify-between mb-4' },
          h('div', null,
            h('p', { className: 'text-pink-200 text-xs font-semibold uppercase tracking-widest mb-1' }, '💉 Wegovy-protokollet'),
            h('p', { className: 'text-3xl font-black' }, 'Vecka ' + weeksOn + ' på ' + currentStep.dose + ' mg'),
            h('p', { className: 'text-pink-200 text-sm mt-1' }, 'Start: ' + wegovyProtocol.start_date)
          ),
          h('button', { onClick: openDoseForm, className: 'bg-white/20 hover:bg-white/30 text-white font-bold px-4 py-2 rounded-xl text-sm' }, '+ Logga dos')
        ),
        h('div', { className: 'grid grid-cols-2 md:grid-cols-4 gap-3' },
          h('div', { className: 'bg-white/15 rounded-xl p-3' },
            h('p', { className: 'text-pink-200 text-xs' }, 'Senaste dos'),
            h('p', { className: 'text-xl font-black' }, latestDose ? new Date(latestDose.date).toLocaleDateString('sv-SE',{day:'numeric',month:'short'}) : '–'),
            h('p', { className: 'text-xs text-pink-200' }, daysSinceLast !== null ? daysSinceLast + ' dagar sen' : '–')
          ),
          h('div', { className: 'bg-white/15 rounded-xl p-3' },
            h('p', { className: 'text-pink-200 text-xs' }, 'Nästa dos'),
            h('p', { className: 'text-xl font-black' }, new Date(nextTue).toLocaleDateString('sv-SE',{day:'numeric',month:'short'})),
            h('p', { className: 'text-xs text-pink-200' }, daysToNext === 0 ? 'Idag!' : 'om ' + daysToNext + ' dagar')
          ),
          h('div', { className: 'bg-white/15 rounded-xl p-3' },
            h('p', { className: 'text-pink-200 text-xs' }, 'Streak'),
            h('p', { className: 'text-xl font-black' }, streak + ' 💉'),
            h('p', { className: 'text-xs text-pink-200' }, streak === 1 ? 'tisdag i rad' : 'tisdagar i rad')
          ),
          h('div', { className: 'bg-white/15 rounded-xl p-3' },
            h('p', { className: 'text-pink-200 text-xs' }, 'Viktändring'),
            h('p', { className: 'text-xl font-black ' + (weightChange !== null && parseFloat(weightChange) < 0 ? 'text-green-300' : 'text-red-300') },
              weightChange !== null ? (parseFloat(weightChange) > 0 ? '+' : '') + weightChange + ' kg' : '–'),
            h('p', { className: 'text-xs text-pink-200' }, weightAtStart ? 'från ' + weightAtStart + ' kg' : 'logga vikt vid dos')
          )
        )
      ),
      showDoseForm ? h('div', { className: 'bg-white rounded-2xl shadow-md mb-4 p-6' },
        h('div', { className: 'flex items-center justify-between mb-4' },
          h('h2', { className: 'font-bold text-gray-800 text-lg' }, '💉 Logga dos'),
          h('button', { onClick: function(){ setShowDoseForm(false); }, className: 'text-gray-400 hover:text-gray-600 text-2xl leading-none' }, '×')
        ),
        h('div', { className: 'grid grid-cols-2 gap-4 mb-4' },
          h('div', null,
            h('label', { className: 'text-xs font-medium text-gray-500 block mb-1' }, 'Datum'),
            h('input', { type:'date', value: doseForm.date||'', onChange: function(e){ setDoseForm(Object.assign({},doseForm,{date:e.target.value})); }, className: 'w-full px-3 py-2 border rounded-lg text-sm outline-none' })
          ),
          h('div', null,
            h('label', { className: 'text-xs font-medium text-gray-500 block mb-1' }, 'Dos (mg)'),
            h('select', { value: doseForm.dose||'', onChange: function(e){ setDoseForm(Object.assign({},doseForm,{dose:e.target.value})); }, className: 'w-full px-3 py-2 border rounded-lg text-sm outline-none' },
              [0.25, 0.5, 1.0, 1.7, 2.4].map(function(d){ return h('option',{key:d,value:d}, d+' mg'); })
            )
          ),
          h('div', null,
            h('label', { className: 'text-xs font-medium text-gray-500 block mb-1' }, 'Vikt vid dos (kg)'),
            h('input', { type:'number', step:'0.1', value: doseForm.weight_at_dose||'', onChange: function(e){ setDoseForm(Object.assign({},doseForm,{weight_at_dose:e.target.value})); }, className: 'w-full px-3 py-2 border rounded-lg text-sm outline-none' })
          ),
          h('div', null,
            h('label', { className: 'text-xs font-medium text-gray-500 block mb-1' }, 'Biverkningar'),
            h('input', { type:'text', value: doseForm.side_effects||'', placeholder:'t.ex. illamående', onChange: function(e){ setDoseForm(Object.assign({},doseForm,{side_effects:e.target.value})); }, className: 'w-full px-3 py-2 border rounded-lg text-sm outline-none' })
          )
        ),
        h('div', { className: 'mb-4' },
          h('label', { className: 'text-xs font-medium text-gray-500 block mb-1' }, 'Anteckningar'),
          h('input', { type:'text', value: doseForm.notes||'', placeholder:'Valfritt...', onChange: function(e){ setDoseForm(Object.assign({},doseForm,{notes:e.target.value})); }, className: 'w-full px-3 py-2 border rounded-lg text-sm outline-none' })
        ),
        h('button', { onClick: submitDose, className: 'w-full bg-gradient-to-r from-pink-500 to-purple-600 text-white font-bold py-3 rounded-xl' }, 'Spara dos')
      ) : null,
      h('div', { className: 'bg-white rounded-2xl shadow-md mb-4 overflow-hidden' },
        h('div', { className: 'flex items-center justify-between px-6 py-4 border-b border-gray-50' },
          h('div', { className: 'flex items-center gap-3' },
            h('div', { className: 'w-1 h-8 rounded-full bg-purple-500' }),
            h('div', null,
              h('h2', { className: 'font-bold text-gray-800' }, 'Titreringsplan'),
              nextStepDate ? h('p', { className: 'text-xs text-gray-400' }, 'Nästa upptrappning: ' + nextStepDate.toLocaleDateString('sv-SE',{day:'numeric',month:'long',year:'numeric'}) + ' → ' + nextStep.dose + ' mg') : null
            )
          ),
          h('button', { onClick: function(){ setEditProtocol(!editProtocol); }, className: 'text-xs text-indigo-600 hover:underline' }, editProtocol ? 'Stäng' : 'Redigera')
        ),
        editProtocol ? h('div', { className: 'px-6 py-4 border-b border-gray-50' },
          h('label', { className: 'text-xs font-medium text-gray-600 block mb-2' }, 'Veckor per steg (David kör 6v pga defekt penna)'),
          h('div', { className: 'flex gap-2' },
            [4,5,6,8].map(function(w) {
              return h('button', { key:w, onClick: function(){
                var plan = wegovyProtocol.titration_plan.map(function(step, i) {
                  var doses = [0.25,0.5,1.0,1.7,2.4];
                  if (i === wegovyProtocol.titration_plan.length-1) return { weeks: (w*i+1)+'+', dose: doses[i]||step.dose };
                  return { weeks: (w*i+1)+'-'+(w*(i+1)), dose: doses[i]||step.dose };
                });
                saveProtocol(Object.assign({},wegovyProtocol,{weeks_per_step:w,titration_plan:plan}));
              }, className: 'px-4 py-2 rounded-lg text-sm border-2 font-medium '+(wegovyProtocol.weeks_per_step===w?'bg-purple-600 text-white border-purple-600':'border-gray-200 text-gray-600') }, w+'v');
            })
          )
        ) : null,
        h('div', { className: 'px-6 py-5' },
          h('div', { className: 'flex gap-2 overflow-x-auto pb-2' },
            wegovyProtocol.titration_plan.map(function(step, i) {
              var isCurrent = i === stepIdx;
              var isPast = i < stepIdx;
              return h('div', { key:i, className: 'flex-shrink-0 rounded-xl px-4 py-3 text-center border-2 min-w-[90px] '+(isCurrent?'bg-purple-600 border-purple-600 text-white':isPast?'bg-gray-50 border-gray-200 text-gray-400':'bg-white border-gray-200 text-gray-600') },
                h('p', { className: 'text-lg font-black' }, step.dose+' mg'),
                h('p', { className: 'text-xs mt-0.5 '+(isCurrent?'text-purple-200':'') }, 'v'+step.weeks),
                isCurrent ? h('p', { className: 'text-xs text-purple-200 mt-1' }, '← Nu') : null
              );
            })
          )
        )
      ),
      h('div', { className: 'grid grid-cols-2 md:grid-cols-4 gap-4 mb-4' },
        h('div', { className: 'bg-white rounded-xl p-4 shadow-md border-l-4 border-pink-400' },
          h('p', { className: 'text-xs text-gray-500 uppercase tracking-wide font-medium' }, 'Antal doser'),
          h('p', { className: 'text-2xl font-black text-gray-800 mt-1' }, wegovyDoses.length),
          h('p', { className: 'text-xs text-gray-400 mt-0.5' }, 'loggade')
        ),
        h('div', { className: 'bg-white rounded-xl p-4 shadow-md border-l-4 border-purple-400' },
          h('p', { className: 'text-xs text-gray-500 uppercase tracking-wide font-medium' }, 'Totalt mg'),
          h('p', { className: 'text-2xl font-black text-gray-800 mt-1' }, totalMg),
          h('p', { className: 'text-xs text-gray-400 mt-0.5' }, 'mg administrerat')
        ),
        h('div', { className: 'bg-white rounded-xl p-4 shadow-md border-l-4 border-indigo-400' },
          h('p', { className: 'text-xs text-gray-500 uppercase tracking-wide font-medium' }, 'Veckor'),
          h('p', { className: 'text-2xl font-black text-gray-800 mt-1' }, weeksOn),
          h('p', { className: 'text-xs text-gray-400 mt-0.5' }, 'på protokollet')
        ),
        h('div', { className: 'bg-white rounded-xl p-4 shadow-md border-l-4 border-green-400' },
          h('p', { className: 'text-xs text-gray-500 uppercase tracking-wide font-medium' }, 'Snitt/vecka'),
          h('p', { className: 'text-2xl font-black mt-1 '+(weightChange!==null && parseFloat(weightChange)/Math.max(1,weeksOn)<0?'text-green-600':'text-red-500') },
            (weightChange!==null && weeksOn>0) ? (parseFloat(weightChange)/weeksOn).toFixed(2)+' kg' : '–'),
          h('p', { className: 'text-xs text-gray-400 mt-0.5' }, 'viktändring/vecka')
        )
      ),
      h('div', { className: 'bg-white rounded-2xl shadow-md overflow-hidden mb-4' },
        h('div', { className: 'flex items-center gap-3 px-6 py-4 border-b border-gray-50' },
          h('div', { className: 'w-1 h-8 rounded-full bg-pink-500' }),
          h('h2', { className: 'font-bold text-gray-800' }, 'Doshistorik')
        ),
        sortedDoses.length === 0
          ? h('p', { className: 'text-center text-gray-400 py-8' }, 'Ingen dos loggad ännu')
          : h('div', { className: 'divide-y divide-gray-50' },
              sortedDoses.map(function(dose) {
                return h('div', { key: dose.id, className: 'flex items-center justify-between px-6 py-3 hover:bg-gray-50' },
                  h('div', { className: 'flex items-center gap-4' },
                    h('div', { className: 'text-center min-w-[60px]' },
                      h('p', { className: 'font-bold text-gray-800 text-sm' }, new Date(dose.date).toLocaleDateString('sv-SE',{day:'numeric',month:'short'})),
                      h('p', { className: 'text-xs text-gray-400' }, new Date(dose.date).toLocaleDateString('sv-SE',{weekday:'short'}))
                    ),
                    h('div', { className: 'bg-purple-100 text-purple-700 font-bold text-sm px-3 py-1 rounded-full' }, dose.dose+' mg'),
                    h('div', null,
                      dose.side_effects ? h('p', { className: 'text-xs text-gray-500' }, '⚠️ '+dose.side_effects) : null,
                      dose.weight_at_dose ? h('p', { className: 'text-xs text-gray-400' }, '⚖️ '+dose.weight_at_dose+' kg') : null,
                      dose.notes ? h('p', { className: 'text-xs text-gray-400 italic' }, dose.notes) : null
                    )
                  ),
                  h('button', { onClick: function(){ setWegovyDoses(function(prev){ var n=prev.filter(function(x){return x.id!==dose.id;}); window.storage.set('wegovy-doses',JSON.stringify(n)); return n; }); }, className: 'text-gray-300 hover:text-red-500 text-lg transition-colors' }, '✕')
                );
              })
            )
      )
    );
  }

  // Main render
  var allNav = [
    { id:'overview', label:'📊 Översikt', group:'h' },
    { id:'add', label:'➕ Lägg till vikt', group:'h' },
    { id:'workouts', label:'💪 Träning', group:'h' },
    { id:'history', label:'📋 Historik', group:'h' },
    { id:'oura', label:'💍 Oura', group:'h' },
    { id:'wegovy', label:'📉 Viktminskning', group:'h' },
    { id:'settings', label:'⚙️ Inställningar', group:'h' },
  ];
  var backupPanel = showImport ? h('div', { className: 'bg-white rounded-xl p-6 shadow-md mb-6' },
    h('div', { className: 'flex items-center justify-between mb-5' },
      h('h2', { className: 'text-xl font-bold text-gray-800' }, 'Backup & Import'),
      h('button', { onClick:function(){setShowImport(false);}, className:'text-gray-400 hover:text-gray-600 text-2xl leading-none' }, 'x')
    ),
    h('div', { className: 'space-y-6' },
      h('div', { className: 'flex gap-3 flex-wrap' },
        h('button', { onClick:exportData, className:'bg-green-600 text-white px-5 py-2 rounded-lg text-sm font-medium' }, 'Ladda ner backup'),
        h('label', { className:'bg-blue-600 text-white px-5 py-2 rounded-lg text-sm font-medium cursor-pointer' },
          'Aterställ från fil',
          h('input', { type:'file', accept:'.json', onChange:importFromFile, className:'hidden' })
        )
      ),
      h('div', { className: 'border-t pt-5' },
        h('h3', { className: 'font-medium mb-1 text-sm text-gray-700' }, 'Importera historisk viktdata'),
        h('p', { className: 'text-xs text-gray-400 mb-3' }, 'Format per rad: 03-nov 91,1'),
        h('textarea', { value:importText, onChange:function(e){setImportText(e.target.value);}, placeholder:'03-nov 91,1', className:'w-full px-4 py-2 border rounded-lg font-mono text-sm mb-3 outline-none', rows:6 }),
        h('button', { onClick:importHistoricalData, className:'bg-indigo-600 text-white px-5 py-2 rounded-lg text-sm font-medium' }, 'Importera')
      )
    )
  ) : null;
  return h('div', { className: 'min-h-screen bg-gradient-to-br from-blue-50 to-indigo-100' },
    h(Toast, { toast: toast, onClose: function(){ setToast(null); } }),
    h('div', { className: 'md:hidden bg-white shadow-sm px-4 pt-4 pb-2' },
      h('h1', { className: 'text-xl font-bold text-gray-800 mb-2' }, 'Hälsodagbok'),
      h('div', { className: 'flex gap-2 overflow-x-auto pb-2' },
        allNav.map(function(n) {
          return h('button', { key:n.id, onClick:function(){setView(n.id);},
            className:'px-3 py-2 rounded-lg text-sm font-medium whitespace-nowrap '+(view===n.id?'bg-indigo-600 text-white':'bg-gray-100 text-gray-700') }, n.label);
        }),
        h('button', { onClick:function(){setShowImport(!showImport);}, className:'px-3 py-2 rounded-lg text-sm bg-gray-100 text-gray-700 whitespace-nowrap' }, 'Backup')
      )
    ),
    h('div', { className: 'flex' },
      h('aside', { className: 'hidden md:flex flex-col fixed left-0 top-0 h-full w-56 bg-white shadow-xl z-10 overflow-y-auto' },
        h('div', { className: 'p-5' },
          h('div', { className: 'mb-5 pb-4 border-b border-gray-100' },
            h('div', { className: 'flex items-center gap-2 mb-2' },
              h('div', { className: 'text-2xl' }, '🏥'),
              h('div', null,
                h('h1', { className: 'text-base font-bold text-gray-800 leading-tight' }, 'Hälsodagbok'),
                h('p', { className: 'text-xs text-gray-400' }, new Date().toLocaleDateString('sv-SE',{day:'numeric',month:'long'}))
              )
            ),
            stats ? h('div', { className: 'bg-indigo-50 rounded-xl px-3 py-2 mt-2' },
              h('p', { className: 'text-xs text-indigo-400 font-medium' }, 'Senaste mätning'),
              h('p', { className: 'text-lg font-black text-indigo-700 leading-tight' }, stats.latest.weight + ' kg'),
              h('p', { className: 'text-xs ' + (parseFloat(stats.diff) <= 0 ? 'text-green-500' : 'text-red-400') },
                (parseFloat(stats.diff) > 0 ? '▲ +' : '▼ ') + stats.diff + ' kg från förra')
            ) : null
          ),
          h('p', { className: 'text-xs font-bold text-gray-400 uppercase tracking-widest mb-2 px-1' }, 'Hälsa'),
          h('nav', { className: 'flex flex-col gap-0.5 mb-4' },
            allNav.filter(function(n){return n.group==='h';}).map(function(n){
              var active = view === n.id;
              return h('button', { key:n.id, onClick:function(){setView(n.id);},
                className:'text-left px-3 py-2.5 rounded-xl text-sm transition-colors w-full '+(active?'bg-indigo-50 text-indigo-700 font-bold border-l-4 border-indigo-500':'text-gray-600 hover:bg-gray-50 font-medium border-l-4 border-transparent') }, n.label);
            }),
            h('button', { onClick:function(){setShowImport(!showImport);},
              className:'text-left px-3 py-2.5 rounded-xl text-sm font-medium transition-colors w-full '+(showImport?'bg-indigo-50 text-indigo-700 font-bold border-l-4 border-indigo-500':'text-gray-600 hover:bg-gray-50 border-l-4 border-transparent') }, '💾 Backup')
          ),
        )
      ),
      h('main', { className: 'flex-1 md:ml-56 p-4 md:p-8 min-h-screen' },
        h('div', { className: 'max-w-5xl mx-auto' },
          backupPanel,
          view === 'overview' ? renderOverview()  : null,
          view === 'add'      ? renderAdd()       : null,
          view === 'workouts' ? renderWorkouts()  : null,
          view === 'goals'    ? renderGoals()     : null,
          view === 'history'  ? renderHistory()   : null,
          view === 'settings' ? renderSettings()  : null,
          view === 'oura'     ? renderOura()      : null,
          view === 'wegovy'   ? renderWegovy()    : null
        )
      )
    )
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(h(WeightStepTracker, null));

</script>
</body>
</html>
